<!-- @dsCard group="Brand" viewport="700x180" name="Logo & wordmark" subtitle="App-icon mark (cream pizza slice on terracotta) + the Bitter wordmark lockup" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;padding:22px;background:var(--card);font-family:var(--font-body);display:flex;align-items:center;gap:26px}
.icon{width:88px;height:88px;flex-shrink:0;border-radius:20px;box-shadow:var(--shadow)}
.lock{display:flex;align-items:center;gap:14px}
.lock img{width:52px;height:52px;border-radius:12px}
.mark{font-family:var(--font-display);font-weight:700;font-size:32px;color:var(--ink);letter-spacing:.2px}
.note{font-size:12px;color:var(--muted);max-width:190px;line-height:1.5}</style></head>
<body>
<img class="icon" src="../assets/logo.svg" alt="Teigmeister app icon">
<div class="lock"><img src="../assets/logo.svg" alt=""><span class="mark">Teigmeister</span></div>
<div class="note">The app-icon mark: a cream pizza-slice line drawing on the terracotta gradient, 118px-radius squircle. Pair it left of the Bitter wordmark for the horizontal lockup.</div>
</body></html>
