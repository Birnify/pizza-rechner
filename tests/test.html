<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Pizzateig-Rechner — Tests</title>
<style>
  body{font-family:-apple-system,"Segoe UI",Roboto,sans-serif;background:#faf6f0;color:#2b2420;margin:0;padding:24px;line-height:1.5;}
  h1{font-size:20px;}
  h2{font-size:15px;margin:24px 0 8px;color:#8a7f76;border-bottom:1px solid #ece3d8;padding-bottom:4px;}
  #summary{font-size:16px;font-weight:700;padding:10px 14px;border-radius:10px;margin:14px 0;display:inline-block;}
  #summary.ok{background:#e7f3e9;color:#2f6b38;}
  #summary.fail{background:#fdeceb;color:#a8341f;}
  .case{background:#fff;border:1px solid #ece3d8;border-radius:10px;padding:12px 14px;margin-bottom:10px;}
  .case h3{margin:0 0 6px;font-size:14px;}
  .assert{font-family:ui-monospace,Consolas,monospace;font-size:12.5px;padding:2px 0;}
  .assert.pass::before{content:"✓ ";color:#2f6b38;}
  .assert.fail{color:#a8341f;font-weight:700;}
  .assert.fail::before{content:"✗ ";}
  #stubs{position:absolute;left:-9999px;top:-9999px;}
  /* Duplikat der Feature-Flag-"hints"-Regel aus css/styles.css (v3.17.0) — test.html
     lädt bewusst kein echtes App-Stylesheet (reine Rechenlogik-Tests, eigenes minimales
     Test-Runner-CSS), daher hier 1:1 dieselbe Regel nur für den DOM-Effekt-Test unten. */
  body.hints-off .hint,
  body.hints-off .timersys-hint,
  body.hints-off .timerhint{display:none;}
</style>
</head>
<body>
<h1>🍕 Pizzateig-Rechner — Rechenlogik-Tests</h1>
<p>Per Doppelklick öffnen. Testet die echten Module gegen erwartete Werte — ohne Server, ohne Installation.</p>
<div id="summary">läuft…</div>
<div id="results"></div>

<div id="stubs">
  <span id="totalW"></span><span id="ballsOut"></span><span id="ballwOut"></span>
  <span id="gFlour"></span><span id="gWater"></span><span id="gSalt"></span>
  <span id="gYeast"></span><span id="yLabel"></span><span id="gOil"></span><div id="gOilRow"></div>
  <span id="gSugar"></span><div id="gSugarRow"></div>
  <span id="pFlour"></span><span id="pWater"></span><span id="pYeast"></span><span id="pyLabel"></span>
  <span id="mFlour"></span><span id="mWater"></span><span id="mSalt"></span><span id="mYeast"></span>
  <span id="mOil"></span><div id="mOilRow"></div>
  <span id="mSugar"></span><div id="mSugarRow"></div>
  <div id="mYeastRow"></div>
  <span id="waterTemp"></span><span id="iceAmt"></span><div id="iceNote"></div>
  <div id="guideSummary"></div><div id="guideSteps"></div>
  <div id="flourWarn"></div>
  <div id="shoppingList"></div>
  <select id="flour"><option value="caputo_pizzeria" selected></option></select>
  <input type="text" id="timeISO">
  <div id="recipesCard"></div><div id="shareBlock"></div><div id="shoppingRow"></div>
  <select id="preset"><option value=""></option><option value="newyork_style"></option><option value="napoli_klassisch"></option></select>
  <div id="sugarBlock"></div><input type="checkbox" id="flagNewYorkStyle">
  <div class="hint" id="testHintStub">Erklärender Beispiel-Hinweistext</div>
  <button type="button" id="testDescribedBtn" aria-describedby="testHintStub">Beispiel-Button</button>
  <div class="seg" id="themeSwitch">
    <button type="button" data-theme-choice="light">Hell</button>
    <button type="button" data-theme-choice="dark">Dunkel</button>
  </div>
  <div id="themeAnnounce" role="status" aria-live="polite"></div>
</div>

<script src="../js/dom.js"></script>
<script src="../js/state.js"></script>
<script src="../js/i18n.js"></script>
<script src="../js/settings.js"></script>
<script src="../js/theme.js"></script>
<script src="../js/flour.js"></script>
<script src="../js/schedule.js"></script>
<script src="../js/guide.js"></script>
<script src="../js/calc.js"></script>
<script src="../js/print.js"></script>
<script src="../js/pdf.js"></script>
<script src="../js/storage.js"></script>
<script src="../js/share.js"></script>
<script src="../js/party.js"></script>

<script>
"use strict";
(function () {
  const results = document.getElementById('results');
  let passed = 0, failed = 0;

  // --- Sprachversion (js/i18n.js, v3.28.0): Determinismus erzwingen -----------------
  // Die gesamte restliche Testsuite prüft deutsche Textausgaben 1:1 als String-Literale
  // (z. B. "Kneten", "Stockgare", "Rezept 1", "Tipp: "). PZ.t() liefert je nach aktiver
  // Sprache unterschiedlichen Text — ohne diesen Fix würde die automatische
  // Spracherkennung (navigator.language des Test-Browsers) oder ein alter, im selben
  // Browser-Profil liegender "pizzaLang"-Wert aus einem echten Nutzungslauf hier
  // durchschlagen und praktisch alle Textvergleiche unten zum Flackern bringen. Deshalb
  // hier VOR jedem Testlauf explizit auf Deutsch fixieren, unabhängig vom Browser/Profil.
  try { localStorage.removeItem('pizzaLang'); } catch (e) { /* ignore */ }
  if (PZ.setLang) PZ.setLang('de');

  // Basis-Zustand für alle Tests
  const BASE = {
    balls: 4, ballw: 250, hyd: 62, salt: 2.8, oil: 0, sugar: 0,
    method: 'direct', pref: 70, bhyd: 45, prefMature: 24, prefStage: 'b24',
    yeastType: 'fresh', yeast: 0.30,
    ddt: 24, room: 21, flourTemp: 21, knead: '3',
    timeMode: 'start', timeISO: '',
    flour: 'caputo_pizzeria',
    coldStage: 'balls'
  };

  function round(x) { return typeof x === 'number' ? Math.round(x * 1000) / 1000 : x; }

  // Stellt sicher dass die Option im Select existiert (für Mehl-Tests)
  function setFlour(key) {
    const sel = document.getElementById('flour');
    if (!sel.querySelector('option[value="' + key + '"]')) {
      const o = document.createElement('option');
      o.value = key;
      sel.appendChild(o);
    }
    sel.value = key;
  }

  // --- Stubs für js/storage.js: ui.js ist hier nicht geladen (kein DOM-Markup
  // für Slider/Segmente), storage.js ruft aber PZ.set/selectSeg/applyMethod/
  // updateTimeLabel auf. Diese Stubs übernehmen nur die state-Zuweisung, ohne
  // echtes UI zu berühren — die Rechenlogik-Module bleiben unverändert getestet.
  PZ.set = new Proxy({}, { get: () => (val) => { /* no-op, state wird von storage.js direkt per Object.assign gesetzt */ } });
  PZ.selectSeg = function () {};
  PZ.applyMethod = function () {};
  PZ.updateTimeLabel = function () {};

  // --- Feature-Flags (js/settings.js) — Baseline für die gesamte restliche Testsuite ---
  // Alle bestehenden Tests unten sind so geschrieben, als wären sämtliche Zusatzfunktionen
  // aktiv (Stand vor Einführung der Feature-Flags in dieser Version) — sonst würde z. B.
  // der Default "freezeHint: false" den bestehenden Einfrier-Hinweis-Test brechen. Deshalb
  // hier explizit auf "alles an" setzen; die eigentliche Flag-Logik (Defaults, Persistenz,
  // Render-Effekt der einzelnen Flags) wird weiter unten in einer eigenen Sektion geprüft,
  // die einzelne Flags gezielt aus- und wieder auf diese Baseline zurückschaltet.
  Object.assign(PZ.FLAGS, {
    timer: true, timerSystem: true, share: true, shopping: true, freezeHint: true, multiRecipes: true, hints: true
  });

  // --- Haupt-Testfall: setzt state, rechnet, prüft R-Werte ---
  function testCase(name, overrides, buildChecks) {
    const state = Object.assign({}, BASE, overrides);
    Object.assign(PZ.state, state);
    if (state.flour) setFlour(state.flour);
    PZ.calc();
    const checks = buildChecks(PZ.R);
    renderBox(name, checks.map(([label, actual, expected, tol]) => {
      const ok = (tol == null) ? actual === expected : Math.abs(actual - expected) <= tol;
      return { label, actual, expected, tol, ok };
    }));
  }

  // --- Schedule-Testfall: setzt state, ruft PZ.schedule(), prüft Felder ---
  // Für string-expected: prüft ob actual den string enthält (Label-Checks).
  // Für number-expected mit tol: Absolutdifferenz ≤ tol.
  // Für boolean/exact: ===
  function testScheduleCase(name, overrides, buildChecks) {
    Object.assign(PZ.state, BASE, overrides);
    const f = PZ.schedule();
    const checks = buildChecks(f);
    renderBox(name, checks.map(([label, actual, expected, tol]) => {
      let ok;
      if (typeof expected === 'string') {
        ok = String(actual).includes(expected);
      } else if (tol == null) {
        ok = actual === expected;
      } else {
        ok = Math.abs(actual - expected) <= tol;
      }
      return { label, actual, expected, tol, ok };
    }));
  }

  // --- Mehl-Warn-Testfall: prüft innerHTML von #flourWarn ---
  function testFlourWarn(name, overrides, buildChecks) {
    const state = Object.assign({}, BASE, overrides);
    Object.assign(PZ.state, state);
    if (state.flour) setFlour(state.flour);
    PZ.calc();
    const html = (document.getElementById('flourWarn') || {}).innerHTML || '';
    const checks = buildChecks(html);
    renderBox(name, checks.map(([label, ok]) => ({ label, ok, actual: ok ? 'ja' : 'nein', expected: 'ja', tol: null })));
  }

  function renderBox(name, checks) {
    const box = document.createElement('div');
    box.className = 'case';
    const h = document.createElement('h3');
    h.textContent = name;
    box.appendChild(h);
    checks.forEach(({ label, actual, expected, tol, ok }) => {
      const line = document.createElement('div');
      line.className = 'assert ' + (ok ? 'pass' : 'fail');
      line.textContent = ok
        ? label + ' = ' + round(actual)
        : label + ': erwartet ' + JSON.stringify(expected) + (tol != null ? ' ±' + tol : '') + ', war ' + JSON.stringify(round(actual));
      box.appendChild(line);
      ok ? passed++ : failed++;
    });
    results.appendChild(box);
  }

  function heading(text) {
    const h = document.createElement('h2');
    h.textContent = text;
    results.appendChild(h);
  }

  // ─────────────────────────────────────────────────────────────
  heading('1 · Bäckerprozente');

  testCase('Direkt · Standard (4×250 g, 62 % Hyd, 2,8 % Salz, 0,30 % Hefe frisch)', {}, R => {
    // flour = 1000 / (1 + 0.62 + 0.028 + 0.003) = 1000 / 1.651 = 605.69
    return [
      ['total', R.total, 1000, 0],
      ['flour', R.flour, 605.69, 0.05],
      ['water', R.water, 375.53, 0.05],
      ['salt',  R.salt,  16.96,  0.05],
      ['yeast', R.yeast, 1.817,  0.01],
    ];
  });

  testCase('Direkt · Skalierung 6×280 g, 65 % Hyd, 0,3 % Hefe', {
    balls: 6, ballw: 280, hyd: 65, yeast: 0.3
  }, R => {
    // total = 1680; flour = 1680 / (1 + 0.65 + 0.028 + 0.003) = 1680 / 1.681 = 999.4
    const expFlour = 1680 / (1 + 0.65 + 0.028 + 0.003);
    return [
      ['total', R.total, 1680, 0],
      ['flour', R.flour, expFlour, 0.1],
      ['water', R.water, expFlour * 0.65, 0.1],
      ['salt',  R.salt,  expFlour * 0.028, 0.05],
    ];
  });

  // ─────────────────────────────────────────────────────────────
  heading('2 · Wassertemperatur & Eismenge (DDT-Methode)');

  testCase('DDT · Hand, Normalraum (room 21, ddt 24)', { room: 21, flourTemp: 21, ddt: 24, knead: '3' }, R => [
    // wT = 24*3 - 21 - 21 - 3 = 27
    ['wT', R.wT, 27, 0],
    ['ice', R.ice, 0, 0],
  ]);

  testCase('DDT · Maschine, Normalraum (room 21, ddt 24)', { room: 21, flourTemp: 21, ddt: 24, knead: '6' }, R => [
    // wT = 24*3 - 21 - 21 - 6 = 24
    ['wT', R.wT, 24, 0],
    ['ice', R.ice, 0, 0],
  ]);

  testCase('DDT · Hand, warmer Raum (room 25, ddt 24)', { room: 25, flourTemp: 25, ddt: 24, knead: '3' }, R => [
    // wT = 24*3 - 25 - 25 - 3 = 19 — kälter als Ttap (25°), also wird Eis gebraucht (nicht 0!)
    // x = 375.53*4.18*(25-19) / (334 + 4.18*19 + 4.18*6) ≈ 21 g
    ['wT', R.wT, 19, 0],
    ['ice', R.ice, 21, 2],
  ]);

  testCase('Eiswasser · Maschine, Sommer (room 28, ddt 22)', { room: 28, flourTemp: 28, ddt: 22, knead: '6' }, R => [
    // wT = 22*3 - 28 - 28 - 6 = 4
    // ice ≈ 375.53 * 4.18 * (28-4) / (334 + 4.18*4 + 4.18*(28-4)) ≈ 84 g
    ['wT', R.wT, 4, 0],
    ['ice', R.ice, 84, 2],
  ]);

  testCase('Eiswasser · Maschine, Extremsommer (room 32, ddt 23)', { room: 32, flourTemp: 32, ddt: 23, knead: '6' }, R => {
    // wT = 23*3 - 32 - 32 - 6 = -1
    // M = water = flour*0.62; x = M*c*(32-(-1)) / (334 + c*(-1) + c*(32-(-1)))
    //   = M*4.18*33 / (334 - 4.18 + 137.94) = M*137.94/467.76 = M*0.2948
    // flour = 1000/1.651 = 605.69; water = 375.53
    // ice ≈ 375.53 * 0.2948 ≈ 111 g
    return [
      ['wT', R.wT, -1, 0],
      ['ice', R.ice, 111, 5],
    ];
  });

  testCase('Kein Eis wenn Leitungswasser kälter als wT', { room: 15, flourTemp: 15, ddt: 23, knead: '3' }, R => [
    // wT = 23*3 - 15 - 15 - 3 = 36 > 15 → kein Eis, Wasser anwärmen
    ['wT', R.wT, 36, 0],
    ['ice', R.ice, 0, 0],
  ]);

  // --- Mehltemperatur getrennt von Raumtemperatur (v3.20.0) ---
  // wT = ddt*3 - room - flourTemp - friction (vorher: room doppelt statt eigenem flourTemp).
  testCase('DDT · Mehl kühler als Raum (Keller/Kühlschrank)', { room: 21, flourTemp: 8, ddt: 24, knead: '3' }, R => [
    // wT = 24*3 - 21 - 8 - 3 = 40
    ['wT', R.wT, 40, 0],
  ]);

  testCase('DDT · Mehl wärmer als Raum', { room: 18, flourTemp: 26, ddt: 24, knead: '3' }, R => [
    // wT = 24*3 - 18 - 26 - 3 = 25
    ['wT', R.wT, 25, 0],
  ]);

  testCase('DDT · Default-Regression: flourTemp startet wie room (unverändertes Verhalten)', { room: 25, flourTemp: 25, ddt: 24, knead: '3' }, R => [
    // identisch zum alten "Mehl- und Raumtemp gleich"-Verhalten, solange flourTemp == room
    ['wT', R.wT, 19, 0],
  ]);

  // --- Kombinationsfälle: flourTemp treibt den Eisbedarf unabhängig vom Raum ---
  testCase('DDT · Eiswasser-Extremfall: warmes Mehl allein treibt den Eisbedarf (Raum moderat)', {
    room: 22, flourTemp: 35, ddt: 24, knead: '6'
  }, R => [
    // wT = 24*3 - 22 - 35 - 6 = 9 — obwohl der Raum mit 22° gar nicht extrem ist, macht allein
    // das warme Mehl (35°) einen spürbaren Eisbedarf nötig (Maschinenknetung, Reibung 6).
    ['wT', R.wT, 9, 0],
    ['ice', R.ice, 48, 3],
  ]);

  testCase('DDT · Kaltes Mehl vermeidet Eisbedarf trotz warmem Raum', {
    room: 30, flourTemp: 5, ddt: 24, knead: '3'
  }, R => [
    // wT = 24*3 - 30 - 5 - 3 = 34 > Ttap(30)+1 → "anwärmen"-Zweig, kein Eis nötig — das kalte
    // Mehl (5°, z.B. aus dem Kühlschrank) überkompensiert den warmen Raum vollständig.
    ['wT', R.wT, 34, 0],
    ['ice', R.ice, 0, 0],
  ]);

  // --- Masseerhaltung: flourTemp beeinflusst NUR wT/Eis, nie die Bäckerprozent-Mengen ---
  (function () {
    Object.assign(PZ.state, BASE, { flourTemp: 5, room: 21, ddt: 24, knead: '3' });
    PZ.calc();
    const R1 = Object.assign({}, PZ.R);
    Object.assign(PZ.state, BASE, { flourTemp: 35, room: 21, ddt: 24, knead: '3' });
    PZ.calc();
    const R2 = Object.assign({}, PZ.R);
    renderBox('flourTemp beeinflusst nur wT/Eis, nicht die Mengen (Masseerhaltung bleibt unberührt)', [
      { label: 'flour identisch trotz unterschiedlichem flourTemp', ok: R1.flour === R2.flour, actual: R2.flour, expected: R1.flour, tol: null },
      { label: 'water identisch', ok: R1.water === R2.water, actual: R2.water, expected: R1.water, tol: null },
      { label: 'salt identisch', ok: R1.salt === R2.salt, actual: R2.salt, expected: R1.salt, tol: null },
      { label: 'yeast identisch', ok: R1.yeast === R2.yeast, actual: R2.yeast, expected: R1.yeast, tol: null },
      { label: 'total identisch', ok: R1.total === R2.total, actual: R2.total, expected: R1.total, tol: null },
      { label: 'Kontrolle: wT unterscheidet sich tatsächlich (Test misst wirklich etwas)', ok: R1.wT !== R2.wT, actual: R2.wT, expected: '≠ ' + R1.wT, tol: null }
    ]);
  })();

  // ─────────────────────────────────────────────────────────────
  heading('3 · Vorteig-Aufteilung');

  testCase('Biga · pref 100 %, bhyd 45 %, hyd 65 % — 100 % Hefe in Vorteig', {
    method: 'biga', pref: 100, bhyd: 45, hyd: 65
  }, R => {
    // flour = 1000/1.681 = 594.88; pf = flour; pw = pf*0.45 = 267.70
    // pYeast = yeast (100 %); mFlour = 0; mYeast = 0
    // water = flour*0.65 = 386.67; mWater = water - pw = 118.97
    return [
      ['pf',     R.pf,     594.88, 0.05],
      ['pw',     R.pw,     267.70, 0.05],
      ['pYeast', R.pYeast, 1.785,  0.01],
      ['mFlour', R.mFlour, 0,      0.001],
      ['mWater', R.mWater, 118.97, 0.05],
      ['mYeast', R.mYeast, 0,      0.001],
    ];
  });

  testCase('Biga · pref 70 % — 100 % Hefe in Vorteig, 30 % Mehl im Hauptteig', {
    method: 'biga', pref: 70, bhyd: 45, hyd: 62
  }, R => [
    ['pf = flour × 0,7',          R.pf,     R.flour * 0.7,  0.05],
    ['pw = pf × 0,45',            R.pw,     R.flour * 0.7 * 0.45, 0.05],
    ['pYeast = gesamte Hefe',     R.pYeast, R.yeast,        0.001],
    ['mYeast = 0',                R.mYeast, 0,              0.001],
    ['mFlour = flour × 0,3',      R.mFlour, R.flour * 0.3,  0.05],
  ]);

  testCase('Poolish · pref 50 %, hyd 66 % — Poolish-Wasser ist 1:1 (100 %)', {
    method: 'poolish', pref: 50, hyd: 66
  }, R => [
    ['pf = flour / 2',        R.pf,     R.flour * 0.5, 0.05],
    ['pw = pf (1:1)',         R.pw,     R.pf,           0.05],
    ['pYeast = gesamte Hefe', R.pYeast, R.yeast,        0.001],
    ['mYeast = 0',            R.mYeast, 0,              0.001],
    ['nicht begrenzt',        R.prefClamped, false],
  ]);

  // Regression: Poolish pref 100 % bei hyd 65 % → Vorteig-Wasser würde Gesamtwasser
  // übersteigen (negatives Restwasser). Muss auf hyd-% begrenzt werden.
  testCase('Poolish · pref 100 %, hyd 65 % — wird auf 65 % begrenzt, kein negatives Wasser', {
    method: 'poolish', pref: 100, hyd: 65
  }, R => [
    ['prefClamped',            R.prefClamped, true],
    ['prefEff = hyd',          R.prefEff, 65, 0.5],
    ['pw ≤ Gesamtwasser',      Math.min(R.pw, R.water), R.pw, 0.001],
    ['mWater ≥ 0',             Math.max(0, R.mWater), R.mWater, 0.001],
    ['mFlour = Rest',          R.mFlour, R.flour - R.pf, 0.05],
  ]);

  // Biga bleibt bei pref 100 % unbegrenzt, solange bhyd < hyd
  testCase('Biga · pref 100 %, bhyd 45 %, hyd 62 % — keine Begrenzung nötig', {
    method: 'biga', pref: 100, bhyd: 45, hyd: 62
  }, R => [
    ['nicht begrenzt', R.prefClamped, false],
    ['mWater ≥ 0',     Math.max(0, R.mWater), R.mWater, 0.001],
  ]);

  // Poolish-Clamp exakt an der Grenze: maxPref = hyd/1 * 100 = 65 % bei hyd 65 %.
  // pref genau 65 % darf NICHT geklemmt werden, pref 66 % (1 % drüber) MUSS geklemmt werden.
  testCase('Poolish · pref exakt an der Grenze (65 % bei hyd 65 %) — keine Klemmung', {
    method: 'poolish', pref: 65, hyd: 65
  }, R => [
    ['nicht begrenzt', R.prefClamped, false],
    ['prefEff = 65',   R.prefEff, 65, 0.001],
  ]);

  testCase('Poolish · pref 1 % über der Grenze (66 % bei hyd 65 %) — wird geklemmt', {
    method: 'poolish', pref: 66, hyd: 65
  }, R => [
    ['begrenzt',       R.prefClamped, true],
    ['prefEff = 65',   R.prefEff, 65, 0.001],
  ]);

  // Regression-Anker: Biga kann ebenfalls geklemmt werden, sobald bhyd > hyd
  // (bisher nur der unbegrenzte Fall bhyd < hyd getestet — diese Lücke schließen).
  // bhyd 80 %, hyd 62 % → maxPref = 62/80*100 = 77,5 % → floor = 77.
  testCase('Biga · bhyd 80 % > hyd 62 % — pref 77 % (an der Grenze) NICHT geklemmt', {
    method: 'biga', pref: 77, bhyd: 80, hyd: 62
  }, R => [
    ['nicht begrenzt', R.prefClamped, false],
    ['prefEff = 77',   R.prefEff, 77, 0.001],
    ['mWater ≥ 0',     Math.max(0, R.mWater), R.mWater, 0.001],
  ]);

  testCase('Biga · bhyd 80 % > hyd 62 % — pref 78 % (1 % drüber) wird geklemmt', {
    method: 'biga', pref: 78, bhyd: 80, hyd: 62
  }, R => [
    ['begrenzt',       R.prefClamped, true],
    ['prefEff = 77',   R.prefEff, 77, 0.001],
    ['mWater ≥ 0',     Math.max(0, R.mWater), R.mWater, 0.001],
  ]);

  testCase('Biga · bhyd 80 % > hyd 62 % — pref 100 % ebenfalls auf 77 % geklemmt', {
    method: 'biga', pref: 100, bhyd: 80, hyd: 62
  }, R => [
    ['begrenzt',       R.prefClamped, true],
    ['prefEff = 77',   R.prefEff, 77, 0.001],
  ]);

  // ─────────────────────────────────────────────────────────────
  heading('4 · Trockenhefe-Umrechnung');

  testCase('Trockenhefe = 1/3 der Frischhefemenge', { yeastType: 'dry', yeast: 0.30 }, R => [
    ['yeast (trocken)', R.yeast, R.flour * 0.003 * (1 / 3), 0.005],
    ['yWord', R.yWord, '(trocken)'],
  ]);

  testCase('Trockenhefe in Biga — 100 % in Vorteig', {

  // fmtClock-Nachbau (aus js/guide.js) — nur zum Prüfen des gerenderten Anleitungstexts,

  function fmtClockTest(d) {
    const wd = ['So', 'Mo', 'Di', 'Mi', 'Do', 'Fr', 'Sa'][d.getDay()];
    const p = n => String(n).padStart(2, '0');
    return `${wd} ${p(d.getDate())}.${p(d.getMonth() + 1)}. · ${p(d.getHours())}:${p(d.getMinutes())}`;
  }

  (function () {

      ]);
    })();

    // --- Voller Rundreise-Test wie in der Aufgabenstellung gefordert:
    //     State setzen -> Link bauen -> Link "laden" (URL simulieren) -> State stimmt überein ---
    (function () {
      Object.assign(PZ.state, BASE, { balls: 7, hyd: 71, salt: 2.6, oil: 3, flour: 'caputo_cuoco' });
      const link = PZ.buildShareLink();
      // buildShareLink() nutzt location.href als Basis (Test läuft von tests/test.html) —
      // wir extrahieren nur den kodierten Parameter und simulieren damit exakt das, was
      // tryLoadFromShareLink() beim Öffnen eines solchen Links aus der echten URL läse.
      const encodedParam = new URL(link).searchParams.get('r');

      // State zurücksetzen (simuliert einen frischen Seitenaufruf mit anderen Werten)
      Object.assign(PZ.state, BASE, { balls: 1, hyd: 55, salt: 1, oil: 0, flour: 'caputo_pizzeria' });

      // history.replaceState + URLSearchParams über die echte Test-URL ansteuern, indem
      // wir denselben Parameter an die aktuelle Test-URL anhängen, laden lassen, danach
      // wieder sauber entfernen (darf die Test-Seite nicht dauerhaft verändern).
      const originalUrl = location.href;
      const testUrl = new URL(originalUrl);
      testUrl.searchParams.set('r', encodedParam);
      history.replaceState(null, '', testUrl.toString());

      const applied = PZ.tryLoadFromShareLink();

      const balls = PZ.state.balls, hyd = PZ.state.hyd, salt = PZ.state.salt, oil = PZ.state.oil, flour = PZ.state.flour;
      const urlAfter = location.href;

      // Test-URL wieder auf den Ausgangsstand zurücksetzen
      history.replaceState(null, '', originalUrl);

      renderBox('Rundreise-Test: State kodieren -> Link "laden" -> State stimmt überein', [
        { label: 'tryLoadFromShareLink() meldet Erfolg (true)', ok: applied === true, actual: applied, expected: true, tol: null },
        { label: 'balls nach Link-Laden korrekt übernommen', ok: balls === 7, actual: balls, expected: 7, tol: null },
        { label: 'hyd nach Link-Laden korrekt übernommen', ok: hyd === 71, actual: hyd, expected: 71, tol: null },
        { label: 'salt nach Link-Laden korrekt übernommen', ok: salt === 2.6, actual: salt, expected: 2.6, tol: null },
        { label: 'oil nach Link-Laden korrekt übernommen', ok: oil === 3, actual: oil, expected: 3, tol: null },
        { label: 'flour nach Link-Laden korrekt übernommen', ok: flour === 'caputo_cuoco', actual: flour, expected: 'caputo_cuoco', tol: null },
        { label: 'Parameter "r" wird nach dem Laden aus der URL entfernt', ok: !new URL(urlAfter).searchParams.has('r'), actual: new URL(urlAfter).searchParams.has('r'), expected: false, tol: null }
      ]);
    })();

    // --- Defensive Fehlerbehandlung: kaputte/alte/fremde Links dürfen NIE abstürzen ---
    (function () {
      const originalUrl = location.href;

      function withParam(rawValue, fn) {
        const u = new URL(originalUrl);
        if (rawValue === null) u.searchParams.delete('r');
        else u.searchParams.set('r', rawValue);
        history.replaceState(null, '', u.toString());
        let threw = false, result;
        try { result = PZ.tryLoadFromShareLink(); } catch (e) { threw = true; }
        history.replaceState(null, '', originalUrl);
        return { threw, result };
      }

      const marker = { balls: 42 };

  // Wichtig: flour+water+salt+yeast(frisch)+oil+sugar MUSS exakt das Gesamtgewicht ergeben.
  // Werte hier entsprechen dem neuen "New York Style"-Preset (oil 3 %, sugar 2 %, ballw 300).
  testCase('Direkt · 62 % Hyd, 3 % Öl, 2 % Zucker (New-York-Style-Preset-Werte) — Mehl sinkt, Masse bleibt N×W', {
    oil: 3, sugar: 2, salt: 2.5, yeast: 0.2, ballw: 300

    const total = 1200; // 4 × 300 g
    const expFlour = total / (1 + 0.62 + 0.025 + 0.002 + 0.03 + 0.02);
    return [
      ['total', R.total, total, 0],
      ['flour', R.flour, expFlour, 0.1],
      ['sugar = flour × 0,02', R.sugar, expFlour * 0.02, 0.02],

    ];

  // buildGuidePdfBytes() liest die bereits von PZ.calc()/buildGuide() gerenderte
  // Anleitung direkt aus dem DOM (#guideSummary/#flourWarn/#guideSteps) und baut daraus
  // von Hand ein PDF-1.4-Dokument (kein Font-Embedding, keine externe Bibliothek — s.
  // Kommentar in js/pdf.js). Getestet wird die reine Datenfunktion, kein window.print()-
  // artiger Seiteneffekt (analog zu buildShoppingList() in Sektion 15 — printGuide()/
  // printShoppingList() selbst werden aus demselben Grund auch dort nicht unit-getestet).

  // Dekodiert ein Uint8Array 1:1 zurück in einen JS-String (jedes Byte = ein Zeichen —
  // exakt der Weg, auf dem buildGuidePdfBytes() den PDF-Bytestring erzeugt hat).
  function bytesToStr(bytes) {
    let out = '';
    for (let i = 0; i < bytes.length; i++) out += String.fromCharCode(bytes[i]);
    return out;
  }
  // Nur Codepoints <= 0xFF sind WinAnsi-/Latin-1-tauglich — Voraussetzung dafür, dass
  // sanitizeText() wirklich jeden Textblock von Emoji/Symbolen ohne WinAnsi-Entsprechung
  // befreit hat (sonst würde ein Font ohne Embedding die Zeichen nicht darstellen können).
  function allLatin1(str) {
    for (const ch of str) { if (ch.codePointAt(0) > 0xFF) return false; }
    return true;
  }

      PZ.partyDeleteCustomPizza(pizza.id);
      const all = PZ.partyGetAllPizzas();
      renderBox('deleteCustomPizza() entfernt die Pizza und ihre Stückzahl', [
        { label: 'Wieder nur 8 Pizzen (Presets)', ok: all.length === 8, actual: all.length, expected: 8, tol: null },
        { label: 'Gelöschte Pizza taucht nicht mehr auf', ok: !all.some(p => p.id === pizza.id), actual: all.map(p => p.id), expected: 'ohne gelöschte id', tol: null },
        { label: 'Stückzahl ist mit weg (getQty liefert 0)', ok: PZ.partyGetQty(pizza.id) === 0, actual: PZ.partyGetQty(pizza.id), expected: 0, tol: null }
      ]);
    });

    // --- setQty()/getQty(): klemmt auf 0–50, 0 entfernt den Eintrag wieder ---
    withCleanPartyStorage(() => {
      const r1 = PZ.partySetQty('preset_margherita', 5);
      const r2 = PZ.partySetQty('preset_margherita', 999); // über dem Maximum
      const r3 = PZ.partySetQty('preset_margherita', -3);  // unter dem Minimum
      const r4 = PZ.partySetQty('preset_margherita', 0);   // zurück auf 0
      renderBox('setQty() klemmt auf 0–50 (ganzzahlig), 0 setzt effektiv zurück', [
        { label: 'setQty(5) liefert 5', ok: r1 === 5, actual: r1, expected: 5, tol: null },
        { label: 'setQty(999) klemmt auf 50', ok: r2 === 50, actual: r2, expected: 50, tol: null },
        { label: 'setQty(-3) klemmt auf 0', ok: r3 === 0, actual: r3, expected: 0, tol: null },
        { label: 'setQty(0) liefert 0, getQty() danach ebenfalls 0', ok: r4 === 0 && PZ.partyGetQty('preset_margherita') === 0, actual: [r4, PZ.partyGetQty('preset_margherita')], expected: '[0, 0]', tol: null }
      ]);
    });

    // --- computeAggregatedList(): Kernrechnung — Mengen × Stückzahl, dedupliziert nach Name+Einheit ---
    withCleanPartyStorage(() => {
      PZ.partySetQty('preset_margherita', 3); // 3× 100g Mozzarella, 80g Tomatensauce, 3 Blätter Basilikum
      PZ.partySetQty('preset_salami', 2);     // 2× 90g Mozzarella, 80g Tomatensauce, 40g Salami
      const result = PZ.partyComputeAggregatedList();
      const byName = name => result.ingredients.find(i => i.name === name);
      renderBox('computeAggregatedList() — 3× Margherita + 2× Salami, aggregiert & dedupliziert', [
        { label: 'totalPizzaCount = 5', ok: result.totalPizzaCount === 5, actual: result.totalPizzaCount, expected: 5, tol: null },
        { label: '4 unterschiedliche Zutaten (Tomatensauce, Mozzarella, Basilikum, Salami)', ok: result.ingredients.length === 4, actual: result.ingredients.map(i => i.name), expected: 4, tol: null },
        { label: 'Mozzarella dedupliziert: 3×100 + 2×90 = 480 g', ok: byName('Mozzarella').amount === 480, actual: byName('Mozzarella').amount, expected: 480, tol: null },
        { label: 'Tomatensauce dedupliziert: 3×80 + 2×80 = 400 g', ok: byName('Tomatensauce').amount === 400, actual: byName('Tomatensauce').amount, expected: 400, tol: null },
        { label: 'Salami (nur bei einer Pizza): 2×40 = 80 g', ok: byName('Salami').amount === 80, actual: byName('Salami').amount, expected: 80, tol: null },
        { label: 'Basilikum behält seine eigene Einheit ("Blätter")', ok: byName('Basilikum').unit === 'Blätter', actual: byName('Basilikum').unit, expected: 'Blätter', tol: null }
      ]);
    });

    // --- computeAggregatedList(): Pizzen mit Stückzahl 0 fließen nicht ein ---
    withCleanPartyStorage(() => {
      PZ.partySetQty('preset_margherita', 2);
      PZ.partySetQty('preset_hawaii', 0); // explizit auf 0 gesetzt -> zählt nicht
      const result = PZ.partyComputeAggregatedList();
      renderBox('computeAggregatedList() ignoriert Pizzen mit Stückzahl 0', [
        { label: 'totalPizzaCount = 2 (nur Margherita)', ok: result.totalPizzaCount === 2, actual: result.totalPizzaCount, expected: 2, tol: null },
        { label: 'Kein "Ananas" in der Liste (Hawaii-Zutat, Stückzahl 0)', ok: !result.ingredients.some(i => i.name === 'Ananas'), actual: result.ingredients.map(i => i.name), expected: 'ohne Ananas', tol: null }
      ]);
    });

    // --- computeAggregatedList(): keine Auswahl -> leere, aber gültige Struktur ---
    withCleanPartyStorage(() => {
      const result = PZ.partyComputeAggregatedList();
      renderBox('computeAggregatedList() ohne jede Auswahl liefert eine leere, gültige Struktur', [
        { label: 'totalPizzaCount = 0', ok: result.totalPizzaCount === 0, actual: result.totalPizzaCount, expected: 0, tol: null },
        { label: 'ingredients ist ein leeres Array (kein Fehler)', ok: Array.isArray(result.ingredients) && result.ingredients.length === 0, actual: result.ingredients, expected: '[]', tol: null }
      ]);
    });

    // --- Eigene Pizzen fließen genauso in die Aggregation ein wie Presets ---
    withCleanPartyStorage(() => {
      const pizza = PZ.partyAddCustomPizza('Eigene Kreation', [{ name: 'Trüffelöl', amount: 10, unit: 'g' }]);
      PZ.partySetQty(pizza.id, 4);
      const result = PZ.partyComputeAggregatedList();
      const truffle = result.ingredients.find(i => i.name === 'Trüffelöl');
      renderBox('Eigene Pizzen fließen in computeAggregatedList() genauso ein wie Presets', [
        { label: 'totalPizzaCount = 4', ok: result.totalPizzaCount === 4, actual: result.totalPizzaCount, expected: 4, tol: null },
        { label: 'Trüffelöl: 4×10 = 40 g', ok: !!truffle && truffle.amount === 40, actual: truffle && truffle.amount, expected: 40, tol: null }
      ]);
    });

    // --- partyResetAllQuantities() (v3.30.0): alle Stückzahlen auf 0, Pizzen bleiben ---
    withCleanPartyStorage(() => {
      const pizza = PZ.partyAddCustomPizza('Bleibt erhalten', [{ name: 'Y', amount: 5, unit: 'g' }]);
      PZ.partySetQty('preset_margherita', 3);
      PZ.partySetQty('preset_salami', 2);
      PZ.partySetQty(pizza.id, 4);
      PZ.partyResetAllQuantities();
      const all = PZ.partyGetAllPizzas();
      const result = PZ.partyComputeAggregatedList();
      renderBox('partyResetAllQuantities() setzt alle Stückzahlen zurück, löscht aber keine Pizzen', [
        { label: 'Weiterhin 9 Pizzen (8 Presets + 1 eigene) — nichts gelöscht', ok: all.length === 9, actual: all.length, expected: 9, tol: null },
        { label: 'Margherita-Stückzahl ist jetzt 0', ok: PZ.partyGetQty('preset_margherita') === 0, actual: PZ.partyGetQty('preset_margherita'), expected: 0, tol: null },
        { label: 'Salami-Stückzahl ist jetzt 0', ok: PZ.partyGetQty('preset_salami') === 0, actual: PZ.partyGetQty('preset_salami'), expected: 0, tol: null },
        { label: 'Eigene Pizza-Stückzahl ist jetzt 0', ok: PZ.partyGetQty(pizza.id) === 0, actual: PZ.partyGetQty(pizza.id), expected: 0, tol: null },
        { label: 'Aggregierte Liste ist wieder leer (totalPizzaCount = 0)', ok: result.totalPizzaCount === 0, actual: result.totalPizzaCount, expected: 0, tol: null },
        { label: 'Eigene Pizza "Bleibt erhalten" ist weiterhin in getAllPizzas() vorhanden', ok: all.some(p => p.id === pizza.id && p.name === 'Bleibt erhalten'), actual: all.map(p => p.name), expected: 'enthält "Bleibt erhalten"', tol: null }
      ]);
    });

    // --- Eigener localStorage-Key, komplett getrennt vom Rezepte-Key ---
    (function () {
      const RECIPE_KEY = 'pizzaRechner';
      const recipeBackup = localStorage.getItem(RECIPE_KEY);
      withCleanPartyStorage(() => {
        localStorage.removeItem(RECIPE_KEY);
        try {
          PZ.partyAddCustomPizza('Isolationstest', [{ name: 'X', amount: 1, unit: 'g' }]);
          const recipeRaw = localStorage.getItem(RECIPE_KEY);
          renderBox('Pizza-Party-Daten landen unter einem eigenen localStorage-Key, nicht im Rezepte-Key', [
            { label: '"pizzaPartyPlanner" enthält jetzt Daten', ok: !!localStorage.getItem(PARTY_KEY), actual: !!localStorage.getItem(PARTY_KEY), expected: true, tol: null },
            { label: '"pizzaRechner" (Rezepte-Key) bleibt unberührt (weiterhin leer)', ok: recipeRaw === null, actual: recipeRaw, expected: null, tol: null }
          ]);
        } finally {
          if (recipeBackup !== null) localStorage.setItem(RECIPE_KEY, recipeBackup);
          else localStorage.removeItem(RECIPE_KEY);
        }
      });
    })();

    // --- Robustheit: korruptes JSON im Party-localStorage darf nicht crashen ---
    withCleanPartyStorage(() => {
      localStorage.setItem(PARTY_KEY, '{ das ist kein gültiges JSON');
      let threw = false;
      let pizzas = [];
      try { pizzas = PZ.partyGetAllPizzas(); } catch (e) { threw = true; }
      renderBox('Korruptes JSON im Party-localStorage — keine Exception, fällt auf die 8 Presets zurück', [
        { label: 'Kein Fehler beim Lesen', ok: !threw, actual: threw, expected: false, tol: null },
        { label: 'Trotzdem die 8 Presets verfügbar', ok: pizzas.length === 8, actual: pizzas.length, expected: 8, tol: null }
      ]);
    });

    // Ursprünglichen Party-Stand (falls vorhanden) wiederherstellen, sonst Testspuren entfernen
    if (backup !== null) localStorage.setItem(PARTY_KEY, backup);
    else localStorage.removeItem(PARTY_KEY);
  })();

  // ─────────────────────────────────────────────────────────────
  heading('23 · Sprachversion Deutsch/Englisch (js/i18n.js)');

  // Reine Funktions-/Datenschicht getestet (PZ.t/getLang/setLang/i18nOnChange) — die
  // DOM-Verdrahtung (applyStaticI18n()/data-i18n-Attribute, Sprachumschalter-UI) läuft
  // in tests/test.html mangels passendem Markup nicht mit, analog zum etablierten Umgang
  // mit anderen UI-Modulen hier (js/ui.js, js/newrecipe.js). Jeder Testblock stellt am
  // Ende wieder Deutsch her (Baseline für alle anderen Sektionen dieser Datei).
  (function () {
    const LANG_KEY = 'pizzaLang';
    const backup = localStorage.getItem(LANG_KEY);

    // --- t(): liefert deutschen Text per Default (Baseline dieser Testsuite) ---
    renderBox('t() liefert den deutschen Text für einen bekannten Key', [
      { label: 'label.hyd (de)', ok: PZ.t('label.hyd') === 'Hydration (Wasser)', actual: PZ.t('label.hyd'), expected: 'Hydration (Wasser)', tol: null },
      { label: 'btn.save (de)', ok: PZ.t('btn.save') === 'Speichern', actual: PZ.t('btn.save'), expected: 'Speichern', tol: null }
    ]);

    // --- t(): {platzhalter}-Interpolation ---
    renderBox('t() interpoliert {platzhalter} in vars korrekt', [
      { label: 'party.summaryMany mit n=5', ok: PZ.t('party.summaryMany', { n: 5 }) === '5 Pizzen insgesamt', actual: PZ.t('party.summaryMany', { n: 5 }), expected: '5 Pizzen insgesamt', tol: null },
      { label: 'nav.viewAnnounce mit label="Rezepte"', ok: PZ.t('nav.viewAnnounce', { label: 'Rezepte' }) === 'Ansicht: Rezepte', actual: PZ.t('nav.viewAnnounce', { label: 'Rezepte' }), expected: 'Ansicht: Rezepte', tol: null },
      { label: 'storage.defaultRecipeName mit n=3', ok: PZ.t('storage.defaultRecipeName', { n: 3 }) === 'Rezept 3', actual: PZ.t('storage.defaultRecipeName', { n: 3 }), expected: 'Rezept 3', tol: null }
    ]);

    // --- t(): unbekannter Key -> Key selbst zurück (kein Crash, kein leerer Text) ---
    renderBox('t() liefert bei unbekanntem Key den Key selbst zurück statt zu crashen', [
      { label: 'nicht existierender Key', ok: PZ.t('does.not.exist.at.all') === 'does.not.exist.at.all', actual: PZ.t('does.not.exist.at.all'), expected: 'does.not.exist.at.all', tol: null }
    ]);

    // --- t(): Key nur in Deutsch vorhanden -> Fallback auf Deutsch statt leer/Crash ---
    (function () {
      PZ._i18nAdd('test.onlyGerman', 'Nur Deutsch vorhanden', undefined);
      // Simuliert eine unvollständige Übersetzung: Englisch-Wert fehlt im Wörterbuch.
      delete PZ._I18N_DICT.en['test.onlyGerman'];
      PZ.setLang('en');
      const val = PZ.t('test.onlyGerman');
      PZ.setLang('de');
      renderBox('t() fällt bei fehlender Übersetzung in der Zielsprache auf Deutsch zurück', [
        { label: 'Englisch angefragt, Key nur auf Deutsch vorhanden -> deutscher Text', ok: val === 'Nur Deutsch vorhanden', actual: val, expected: 'Nur Deutsch vorhanden', tol: null }
      ]);
      delete PZ._I18N_DICT.de['test.onlyGerman'];
    })();

    // --- getLang()/setLang(): Umschalten + Persistenz ---
    (function () {
      localStorage.removeItem(LANG_KEY);
      const before = PZ.getLang();
      PZ.setLang('en');
      const afterEn = PZ.getLang();
      const storedEn = localStorage.getItem(LANG_KEY);
      const textEn = PZ.t('btn.save');
      PZ.setLang('de');
      const afterDe = PZ.getLang();
      const storedDe = localStorage.getItem(LANG_KEY);
      const textDe = PZ.t('btn.save');
      renderBox('setLang()/getLang() schalten die Sprache um und persistieren in localStorage', [
        { label: 'Baseline ist Deutsch', ok: before === 'de', actual: before, expected: 'de', tol: null },
        { label: 'setLang("en") -> getLang() liefert "en"', ok: afterEn === 'en', actual: afterEn, expected: 'en', tol: null },
        { label: 'setLang("en") persistiert "en" in localStorage', ok: storedEn === 'en', actual: storedEn, expected: 'en', tol: null },
        { label: 't() liefert danach den englischen Text', ok: textEn === 'Save', actual: textEn, expected: 'Save', tol: null },
        { label: 'setLang("de") -> getLang() liefert "de"', ok: afterDe === 'de', actual: afterDe, expected: 'de', tol: null },
        { label: 'setLang("de") persistiert "de" in localStorage', ok: storedDe === 'de', actual: storedDe, expected: 'de', tol: null },
        { label: 't() liefert danach wieder den deutschen Text', ok: textDe === 'Speichern', actual: textDe, expected: 'Speichern', tol: null }
      ]);
    })();

    // --- setLang(): ungültiger Sprachcode wird ignoriert (kein Crash, keine Änderung) ---
    (function () {
      PZ.setLang('de');
      PZ.setLang('fr'); // nicht unterstützt (nur de/en laut Feature-Auftrag)
      renderBox('setLang() ignoriert nicht unterstützte Sprachcodes', [
        { label: 'Sprache bleibt bei "de"', ok: PZ.getLang() === 'de', actual: PZ.getLang(), expected: 'de', tol: null }
      ]);
    })();

    // --- i18nOnChange(): registrierter Callback feuert bei jedem setLang()-Aufruf ---
    (function () {
      let calls = 0;
      PZ.i18nOnChange(function () { calls++; });
      PZ.setLang('en');
      PZ.setLang('de');
      renderBox('i18nOnChange() registrierte Callbacks feuern bei jedem Sprachwechsel', [
        { label: 'Callback lief genau 2× (2 setLang()-Aufrufe)', ok: calls === 2, actual: calls, expected: 2, tol: null }
      ]);
    })();

    // Ursprünglichen Sprach-Stand (falls vorhanden) wiederherstellen, sonst auf Deutsch
    // zurücksetzen — Baseline für alle vorangegangenen Testsektionen in dieser Datei.
    if (backup !== null) { localStorage.setItem(LANG_KEY, backup); PZ.setLang(backup); }
    else { localStorage.removeItem(LANG_KEY); PZ.setLang('de'); }
  })();

  // ─────────────────────────────────────────────────────────────
  heading('24 · Dunkelmodus (js/theme.js)');

  // Analog zu Sektion 23 (i18n): reine Entscheidungs-/Persistenzfunktionen getestet
  // (PZ._resolveInitialTheme/getTheme/setTheme), plus ein DOM-Effekt-Test für den
  // Umschalter (#themeSwitch-Stub oben) und die Live-Region-Ansage (#themeAnnounce).
  // Die eigentlichen Dunkelmodus-FARBWERTE (css/styles.css, :root[data-theme="dark"])
  // sind hier NICHT geprüft — test.html lädt bewusst kein echtes App-Stylesheet (reine
  // Rechenlogik-/Verhaltens-Tests), Kontrastwerte sind rechnerisch in
  // pizza-rechner-KONTEXT.md dokumentiert und per Screenshot-Verifikation geprüft.
  (function () {
    const THEME_KEY = 'pizzaTheme';
    const backup = localStorage.getItem(THEME_KEY);
    const attrBackup = document.documentElement.getAttribute('data-theme');

    // --- resolveInitialTheme(): reine Entscheidungsfunktion, kein DOM/localStorage ---
    renderBox('PZ._resolveInitialTheme() — gespeicherte manuelle Wahl schlägt immer die Systemeinstellung', [
      { label: 'stored="dark", System hell -> "dark" (manuelle Wahl gewinnt)', ok: PZ._resolveInitialTheme('dark', false) === 'dark', actual: PZ._resolveInitialTheme('dark', false), expected: 'dark', tol: null },
      { label: 'stored="light", System dunkel -> "light" (manuelle Wahl gewinnt)', ok: PZ._resolveInitialTheme('light', true) === 'light', actual: PZ._resolveInitialTheme('light', true), expected: 'light', tol: null },
      { label: 'stored=null, System dunkel -> "dark" (Systemerkennung greift)', ok: PZ._resolveInitialTheme(null, true) === 'dark', actual: PZ._resolveInitialTheme(null, true), expected: 'dark', tol: null },
      { label: 'stored=null, System hell -> "light" (Systemerkennung greift)', ok: PZ._resolveInitialTheme(null, false) === 'light', actual: PZ._resolveInitialTheme(null, false), expected: 'light', tol: null },
      { label: 'stored="quatsch" (unbekannter Wert) -> Systemerkennung statt Crash', ok: PZ._resolveInitialTheme('quatsch', true) === 'dark', actual: PZ._resolveInitialTheme('quatsch', true), expected: 'dark', tol: null }
    ]);

    // --- setTheme()/getTheme(): setzt data-theme, persistiert in localStorage ---
    (function () {
      localStorage.removeItem(THEME_KEY);
      PZ.setTheme('dark');
      const afterDark = PZ.getTheme();
      const attrDark = document.documentElement.getAttribute('data-theme');
      const storedDark = localStorage.getItem(THEME_KEY);
      PZ.setTheme('light');
      const afterLight = PZ.getTheme();
      const attrLight = document.documentElement.getAttribute('data-theme');
      const storedLight = localStorage.getItem(THEME_KEY);
      renderBox('setTheme()/getTheme() schalten das Theme um, setzen data-theme und persistieren', [
        { label: 'setTheme("dark") -> getTheme() liefert "dark"', ok: afterDark === 'dark', actual: afterDark, expected: 'dark', tol: null },
        { label: 'setTheme("dark") setzt data-theme="dark" auf <html>', ok: attrDark === 'dark', actual: attrDark, expected: 'dark', tol: null },
        { label: 'setTheme("dark") persistiert "dark" in localStorage', ok: storedDark === 'dark', actual: storedDark, expected: 'dark', tol: null },
        { label: 'setTheme("light") -> getTheme() liefert "light"', ok: afterLight === 'light', actual: afterLight, expected: 'light', tol: null },
        { label: 'setTheme("light") setzt data-theme="light" auf <html>', ok: attrLight === 'light', actual: attrLight, expected: 'light', tol: null },
        { label: 'setTheme("light") persistiert "light" in localStorage', ok: storedLight === 'light', actual: storedLight, expected: 'light', tol: null }
      ]);
    })();

    // --- setTheme(): ungültiger Wert wird ignoriert (kein Crash, keine Änderung) ---
    (function () {
      PZ.setTheme('dark');
      PZ.setTheme('blau'); // nicht unterstützt (nur light/dark laut Feature-Auftrag)
      renderBox('setTheme() ignoriert nicht unterstützte Werte', [
        { label: 'Theme bleibt bei "dark"', ok: PZ.getTheme() === 'dark', actual: PZ.getTheme(), expected: 'dark', tol: null }
      ]);
    })();

    // --- DOM-Effekt: setTheme() spiegelt den Zustand im #themeSwitch-Stub (aria-pressed/
    // .active), da reflectSwitch() direkt aus setTheme() heraus aufgerufen wird -- unabhängig
    // davon, ob die Klick-Verdrahtung (wireThemeSwitch(), an DOMContentLoaded gebunden) bereits
    // aktiv ist. Bewusst über PZ.setTheme() statt simuliertem button.click() getestet: Letzteres
    // würde voraussetzen, dass DOMContentLoaded schon gefeuert hat, was innerhalb des synchron
    // während des HTML-Parsings laufenden Test-Inline-Scripts dieser Datei NICHT der Fall ist
    // (identischer Timing-Grund, weshalb die Sprachumschalter-UI in Sektion 23 laut dortigem
    // Kommentar ebenfalls nicht per simuliertem Klick getestet wird — nur die zugrunde liegende
    // API). Click-Verdrahtung + Live-Region-Ansage (#themeAnnounce) bleiben entsprechend
    // ungetestet, analog zu #langSwitch/#langAnnounce.
    (function () {
      const lightBtn = document.querySelector('#themeSwitch button[data-theme-choice="light"]');
      const darkBtn = document.querySelector('#themeSwitch button[data-theme-choice="dark"]');
      PZ.setTheme('dark');
      const darkActive = darkBtn.classList.contains('active') && darkBtn.getAttribute('aria-pressed') === 'true';
      const lightInactive = !lightBtn.classList.contains('active') && lightBtn.getAttribute('aria-pressed') === 'false';
      PZ.setTheme('light');
      const lightActive = lightBtn.classList.contains('active') && lightBtn.getAttribute('aria-pressed') === 'true';
      const darkInactive = !darkBtn.classList.contains('active') && darkBtn.getAttribute('aria-pressed') === 'false';
      renderBox('setTheme() spiegelt den Zustand im #themeSwitch-Stub (aria-pressed/.active)', [
        { label: 'setTheme("dark") -> "Dunkel"-Button aktiv (aria-pressed=true)', ok: darkActive, actual: darkActive, expected: true, tol: null },
        { label: 'setTheme("dark") -> "Hell"-Button wird inaktiv', ok: lightInactive, actual: lightInactive, expected: true, tol: null },
        { label: 'setTheme("light") -> "Hell"-Button aktiv (aria-pressed=true)', ok: lightActive, actual: lightActive, expected: true, tol: null },
        { label: 'setTheme("light") -> "Dunkel"-Button wird wieder inaktiv', ok: darkInactive, actual: darkInactive, expected: true, tol: null }
      ]);
    })();

    // Ursprünglichen Theme-Stand (falls vorhanden) wiederherstellen, sonst Key entfernen —
    // Baseline für alle vorangegangenen Testsektionen in dieser Datei.
    if (backup !== null) { localStorage.setItem(THEME_KEY, backup); } else { localStorage.removeItem(THEME_KEY); }
    if (attrBackup !== null) { document.documentElement.setAttribute('data-theme', attrBackup); } else { document.documentElement.removeAttribute('data-theme'); }
  })();

  // ─────────────────────────────────────────────────────────────
  const s = document.getElementById('summary');
  s.textContent = failed === 0
    ? '✓ Alle ' + passed + ' Prüfungen bestanden'
    : '✗ ' + failed + ' von ' + (passed + failed) + ' Prüfungen fehlgeschlagen';
  s.className = failed === 0 ? 'ok' : 'fail';
  console.log('[Tests] ' + passed + ' passed, ' + failed + ' failed');
})();
</script>
