<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Pizzateig-Rechner — Tests</title>
<style>
  body{font-family:-apple-system,"Segoe UI",Roboto,sans-serif;background:#faf6f0;color:#2b2420;margin:0;padding:24px;line-height:1.5;}
  h1{font-size:20px;}
  h2{font-size:15px;margin:24px 0 8px;color:#8a7f76;border-bottom:1px solid #ece3d8;padding-bottom:4px;}
  #summary{font-size:16px;font-weight:700;padding:10px 14px;border-radius:10px;margin:14px 0;display:inline-block;}
  #summary.ok{background:#e7f3e9;color:#2f6b38;}
  #summary.fail{background:#fdeceb;color:#a8341f;}
  .case{background:#fff;border:1px solid #ece3d8;border-radius:10px;padding:12px 14px;margin-bottom:10px;}
  .case h3{margin:0 0 6px;font-size:14px;}
  .assert{font-family:ui-monospace,Consolas,monospace;font-size:12.5px;padding:2px 0;}
  .assert.pass::before{content:"✓ ";color:#2f6b38;}
  .assert.fail{color:#a8341f;font-weight:700;}
  .assert.fail::before{content:"✗ ";}
  #stubs{position:absolute;left:-9999px;top:-9999px;}
</style>
</head>
<body>
<h1>🍕 Pizzateig-Rechner — Rechenlogik-Tests</h1>
<p>Per Doppelklick öffnen. Testet die echten Module gegen erwartete Werte — ohne Server, ohne Installation.</p>
<div id="summary">läuft…</div>
<div id="results"></div>

<div id="stubs">
  <span id="totalW"></span><span id="ballsOut"></span><span id="ballwOut"></span>
  <span id="gFlour"></span><span id="gWater"></span><span id="gSalt"></span>
  <span id="gYeast"></span><span id="yLabel"></span><span id="gOil"></span><div id="gOilRow"></div>
  <span id="pFlour"></span><span id="pWater"></span><span id="pYeast"></span><span id="pyLabel"></span>
  <span id="mFlour"></span><span id="mWater"></span><span id="mSalt"></span><span id="mYeast"></span>
  <span id="mOil"></span><div id="mOilRow"></div>
  <div id="mYeastRow"></div>
  <span id="waterTemp"></span><span id="iceAmt"></span><div id="iceNote"></div>
  <div id="guideSummary"></div><div id="guideSteps"></div>
  <div id="flourWarn"></div>
  <select id="flour"><option value="caputo_pizzeria" selected></option></select>
</div>

<script src="../js/dom.js"></script>
<script src="../js/state.js"></script>
<script src="../js/flour.js"></script>
<script src="../js/schedule.js"></script>
<script src="../js/guide.js"></script>
<script src="../js/calc.js"></script>

<script>
"use strict";
(function () {
  const results = document.getElementById('results');
  let passed = 0, failed = 0;

  // Basis-Zustand für alle Tests
  const BASE = {
    balls: 4, ballw: 250, hyd: 62, salt: 2.8, oil: 0,
    method: 'direct', pref: 70, bhyd: 45, prefMature: 24, prefStage: 'b24',
    yeastType: 'fresh', yeast: 0.30,
    ddt: 24, room: 21, knead: '3',
    timeMode: 'start', timeISO: '',
    flour: 'caputo_pizzeria',
    coldStage: 'balls'
  };

  function round(x) { return typeof x === 'number' ? Math.round(x * 1000) / 1000 : x; }

  // Stellt sicher dass die Option im Select existiert (für Mehl-Tests)
  function setFlour(key) {
    const sel = document.getElementById('flour');
    if (!sel.querySelector('option[value="' + key + '"]')) {
      const o = document.createElement('option');
      o.value = key;
      sel.appendChild(o);
    }
    sel.value = key;
  }

  // --- Haupt-Testfall: setzt state, rechnet, prüft R-Werte ---
  function testCase(name, overrides, buildChecks) {
    const state = Object.assign({}, BASE, overrides);
    Object.assign(PZ.state, state);
    if (state.flour) setFlour(state.flour);
    PZ.calc();
    const checks = buildChecks(PZ.R);
    renderBox(name, checks.map(([label, actual, expected, tol]) => {
      const ok = (tol == null) ? actual === expected : Math.abs(actual - expected) <= tol;
      return { label, actual, expected, tol, ok };
    }));
  }

  // --- Schedule-Testfall: setzt state, ruft PZ.schedule(), prüft Felder ---
  // Für string-expected: prüft ob actual den string enthält (Label-Checks).
  // Für number-expected mit tol: Absolutdifferenz ≤ tol.
  // Für boolean/exact: ===
  function testScheduleCase(name, overrides, buildChecks) {
    Object.assign(PZ.state, BASE, overrides);
    const f = PZ.schedule();
    const checks = buildChecks(f);
    renderBox(name, checks.map(([label, actual, expected, tol]) => {
      let ok;
      if (typeof expected === 'string') {
        ok = String(actual).includes(expected);
      } else if (tol == null) {
        ok = actual === expected;
      } else {
        ok = Math.abs(actual - expected) <= tol;
      }
      return { label, actual, expected, tol, ok };
    }));
  }

  // --- Mehl-Warn-Testfall: prüft innerHTML von #flourWarn ---
  function testFlourWarn(name, overrides, buildChecks) {
    const state = Object.assign({}, BASE, overrides);
    Object.assign(PZ.state, state);
    if (state.flour) setFlour(state.flour);
    PZ.calc();
    const html = (document.getElementById('flourWarn') || {}).innerHTML || '';
    const checks = buildChecks(html);
    renderBox(name, checks.map(([label, ok]) => ({ label, ok, actual: ok ? 'ja' : 'nein', expected: 'ja', tol: null })));
  }

  function renderBox(name, checks) {
    const box = document.createElement('div');
    box.className = 'case';
    const h = document.createElement('h3');
    h.textContent = name;
    box.appendChild(h);
    checks.forEach(({ label, actual, expected, tol, ok }) => {
      const line = document.createElement('div');
      line.className = 'assert ' + (ok ? 'pass' : 'fail');
      line.textContent = ok
        ? label + ' = ' + round(actual)
        : label + ': erwartet ' + JSON.stringify(expected) + (tol != null ? ' ±' + tol : '') + ', war ' + JSON.stringify(round(actual));
      box.appendChild(line);
      ok ? passed++ : failed++;
    });
    results.appendChild(box);
  }

  function heading(text) {
    const h = document.createElement('h2');
    h.textContent = text;
    results.appendChild(h);
  }

  // ─────────────────────────────────────────────────────────────
  heading('1 · Bäckerprozente');

  testCase('Direkt · Standard (4×250 g, 62 % Hyd, 2,8 % Salz, 0,30 % Hefe frisch)', {}, R => {
    // flour = 1000 / (1 + 0.62 + 0.028 + 0.003) = 1000 / 1.651 = 605.69
    return [
      ['total', R.total, 1000, 0],
      ['flour', R.flour, 605.69, 0.05],
      ['water', R.water, 375.53, 0.05],
      ['salt',  R.salt,  16.96,  0.05],
      ['yeast', R.yeast, 1.817,  0.01],
    ];
  });

  testCase('Direkt · Skalierung 6×280 g, 65 % Hyd, 0,3 % Hefe', {
    balls: 6, ballw: 280, hyd: 65, yeast: 0.3
  }, R => {
    // total = 1680; flour = 1680 / (1 + 0.65 + 0.028 + 0.003) = 1680 / 1.681 = 999.4
    const expFlour = 1680 / (1 + 0.65 + 0.028 + 0.003);
    return [
      ['total', R.total, 1680, 0],
      ['flour', R.flour, expFlour, 0.1],
      ['water', R.water, expFlour * 0.65, 0.1],
      ['salt',  R.salt,  expFlour * 0.028, 0.05],
    ];
  });

  // ─────────────────────────────────────────────────────────────
  heading('2 · Wassertemperatur & Eismenge (DDT-Methode)');

  testCase('DDT · Hand, Normalraum (room 21, ddt 24)', { room: 21, ddt: 24, knead: '3' }, R => [
    // wT = 24*3 - 21 - 21 - 3 = 27
    ['wT', R.wT, 27, 0],
    ['ice', R.ice, 0, 0],
  ]);

  testCase('DDT · Maschine, Normalraum (room 21, ddt 24)', { room: 21, ddt: 24, knead: '6' }, R => [
    // wT = 24*3 - 21 - 21 - 6 = 24
    ['wT', R.wT, 24, 0],
    ['ice', R.ice, 0, 0],
  ]);

  testCase('DDT · Hand, warmer Raum (room 25, ddt 24)', { room: 25, ddt: 24, knead: '3' }, R => [
    // wT = 24*3 - 25 - 25 - 3 = 19 — kälter als Ttap (25°), also wird Eis gebraucht (nicht 0!)
    // x = 375.53*4.18*(25-19) / (334 + 4.18*19 + 4.18*6) ≈ 21 g
    ['wT', R.wT, 19, 0],
    ['ice', R.ice, 21, 2],
  ]);

  testCase('Eiswasser · Maschine, Sommer (room 28, ddt 22)', { room: 28, ddt: 22, knead: '6' }, R => [
    // wT = 22*3 - 28 - 28 - 6 = 4
    // ice ≈ 375.53 * 4.18 * (28-4) / (334 + 4.18*4 + 4.18*(28-4)) ≈ 84 g
    ['wT', R.wT, 4, 0],
    ['ice', R.ice, 84, 2],
  ]);

  testCase('Eiswasser · Maschine, Extremsommer (room 32, ddt 23)', { room: 32, ddt: 23, knead: '6' }, R => {
    // wT = 23*3 - 32 - 32 - 6 = -1
    // M = water = flour*0.62; x = M*c*(32-(-1)) / (334 + c*(-1) + c*(32-(-1)))
    //   = M*4.18*33 / (334 - 4.18 + 137.94) = M*137.94/467.76 = M*0.2948
    // flour = 1000/1.651 = 605.69; water = 375.53
    // ice ≈ 375.53 * 0.2948 ≈ 111 g
    return [
      ['wT', R.wT, -1, 0],
      ['ice', R.ice, 111, 5],
    ];
  });

  testCase('Kein Eis wenn Leitungswasser kälter als wT', { room: 15, ddt: 23, knead: '3' }, R => [
    // wT = 23*3 - 15 - 15 - 3 = 36 > 15 → kein Eis, Wasser anwärmen
    ['wT', R.wT, 36, 0],
    ['ice', R.ice, 0, 0],
  ]);

  // ─────────────────────────────────────────────────────────────
  heading('3 · Vorteig-Aufteilung');

  testCase('Biga · pref 100 %, bhyd 45 %, hyd 65 % — 100 % Hefe in Vorteig', {
    method: 'biga', pref: 100, bhyd: 45, hyd: 65
  }, R => {
    // flour = 1000/1.681 = 594.88; pf = flour; pw = pf*0.45 = 267.70
    // pYeast = yeast (100 %); mFlour = 0; mYeast = 0
    // water = flour*0.65 = 386.67; mWater = water - pw = 118.97
    return [
      ['pf',     R.pf,     594.88, 0.05],
      ['pw',     R.pw,     267.70, 0.05],
      ['pYeast', R.pYeast, 1.785,  0.01],
      ['mFlour', R.mFlour, 0,      0.001],
      ['mWater', R.mWater, 118.97, 0.05],
      ['mYeast', R.mYeast, 0,      0.001],
    ];
  });

  testCase('Biga · pref 70 % — 100 % Hefe in Vorteig, 30 % Mehl im Hauptteig', {
    method: 'biga', pref: 70, bhyd: 45, hyd: 62
  }, R => [
    ['pf = flour × 0,7',          R.pf,     R.flour * 0.7,  0.05],
    ['pw = pf × 0,45',            R.pw,     R.flour * 0.7 * 0.45, 0.05],
    ['pYeast = gesamte Hefe',     R.pYeast, R.yeast,        0.001],
    ['mYeast = 0',                R.mYeast, 0,              0.001],
    ['mFlour = flour × 0,3',      R.mFlour, R.flour * 0.3,  0.05],
  ]);

  testCase('Poolish · pref 50 %, hyd 66 % — Poolish-Wasser ist 1:1 (100 %)', {
    method: 'poolish', pref: 50, hyd: 66
  }, R => [
    ['pf = flour / 2',        R.pf,     R.flour * 0.5, 0.05],
    ['pw = pf (1:1)',         R.pw,     R.pf,           0.05],
    ['pYeast = gesamte Hefe', R.pYeast, R.yeast,        0.001],
    ['mYeast = 0',            R.mYeast, 0,              0.001],
    ['nicht begrenzt',        R.prefClamped, false],
  ]);

  // Regression: Poolish pref 100 % bei hyd 65 % → Vorteig-Wasser würde Gesamtwasser
  // übersteigen (negatives Restwasser). Muss auf hyd-% begrenzt werden.
  testCase('Poolish · pref 100 %, hyd 65 % — wird auf 65 % begrenzt, kein negatives Wasser', {
    method: 'poolish', pref: 100, hyd: 65
  }, R => [
    ['prefClamped',            R.prefClamped, true],
    ['prefEff = hyd',          R.prefEff, 65, 0.5],
    ['pw ≤ Gesamtwasser',      Math.min(R.pw, R.water), R.pw, 0.001],
    ['mWater ≥ 0',             Math.max(0, R.mWater), R.mWater, 0.001],
    ['mFlour = Rest',          R.mFlour, R.flour - R.pf, 0.05],
  ]);

  // Biga bleibt bei pref 100 % unbegrenzt, solange bhyd < hyd
  testCase('Biga · pref 100 %, bhyd 45 %, hyd 62 % — keine Begrenzung nötig', {
    method: 'biga', pref: 100, bhyd: 45, hyd: 62
  }, R => [
    ['nicht begrenzt', R.prefClamped, false],
    ['mWater ≥ 0',     Math.max(0, R.mWater), R.mWater, 0.001],
  ]);

  // Poolish-Clamp exakt an der Grenze: maxPref = hyd/1 * 100 = 65 % bei hyd 65 %.
  // pref genau 65 % darf NICHT geklemmt werden, pref 66 % (1 % drüber) MUSS geklemmt werden.
  testCase('Poolish · pref exakt an der Grenze (65 % bei hyd 65 %) — keine Klemmung', {
    method: 'poolish', pref: 65, hyd: 65
  }, R => [
    ['nicht begrenzt', R.prefClamped, false],
    ['prefEff = 65',   R.prefEff, 65, 0.001],
  ]);

  testCase('Poolish · pref 1 % über der Grenze (66 % bei hyd 65 %) — wird geklemmt', {
    method: 'poolish', pref: 66, hyd: 65
  }, R => [
    ['begrenzt',       R.prefClamped, true],
    ['prefEff = 65',   R.prefEff, 65, 0.001],
  ]);

  // Regression-Anker: Biga kann ebenfalls geklemmt werden, sobald bhyd > hyd
  // (bisher nur der unbegrenzte Fall bhyd < hyd getestet — diese Lücke schließen).
  // bhyd 80 %, hyd 62 % → maxPref = 62/80*100 = 77,5 % → floor = 77.
  testCase('Biga · bhyd 80 % > hyd 62 % — pref 77 % (an der Grenze) NICHT geklemmt', {
    method: 'biga', pref: 77, bhyd: 80, hyd: 62
  }, R => [
    ['nicht begrenzt', R.prefClamped, false],
    ['prefEff = 77',   R.prefEff, 77, 0.001],
    ['mWater ≥ 0',     Math.max(0, R.mWater), R.mWater, 0.001],
  ]);

  testCase('Biga · bhyd 80 % > hyd 62 % — pref 78 % (1 % drüber) wird geklemmt', {
    method: 'biga', pref: 78, bhyd: 80, hyd: 62
  }, R => [
    ['begrenzt',       R.prefClamped, true],
    ['prefEff = 77',   R.prefEff, 77, 0.001],
    ['mWater ≥ 0',     Math.max(0, R.mWater), R.mWater, 0.001],
  ]);

  testCase('Biga · bhyd 80 % > hyd 62 % — pref 100 % ebenfalls auf 77 % geklemmt', {
    method: 'biga', pref: 100, bhyd: 80, hyd: 62
  }, R => [
    ['begrenzt',       R.prefClamped, true],
    ['prefEff = 77',   R.prefEff, 77, 0.001],
  ]);

  // ─────────────────────────────────────────────────────────────
  heading('4 · Trockenhefe-Umrechnung');

  testCase('Trockenhefe = 1/3 der Frischhefemenge', { yeastType: 'dry', yeast: 0.30 }, R => [
    ['yeast (trocken)', R.yeast, R.flour * 0.003 * (1 / 3), 0.005],
    ['yWord', R.yWord, '(trocken)'],
  ]);

  testCase('Trockenhefe in Biga — 100 % in Vorteig', {
    yeastType: 'dry', yeast: 0.30, method: 'biga', pref: 70
  }, R => [
    ['pYeast = gesamte Trockenhefe', R.pYeast, R.yeast, 0.001],
    ['mYeast = 0',                   R.mYeast, 0,        0.001],
  ]);

  // ─────────────────────────────────────────────────────────────
  heading('5 · Gärzeit-Schedule (Schwellenwerte)');

  testScheduleCase('Direkt · Schnellgare (y ≥ 1,2 %)', { method: 'direct', yeast: 2.5 }, f => [
    ['label', f.label, 'Schnellgare'],
    ['bulkMin', f.bulkMin, 105, 0],
    ['proofMin', f.proofMin, 150, 0],
    ['cold', f.cold, false],
  ]);

  testScheduleCase('Direkt · Mittlere Gare (0,5 % ≤ y < 1,2 %)', { method: 'direct', yeast: 0.5 }, f => [
    ['label', f.label, 'Mittlere'],
    ['bulkMin', f.bulkMin, 120, 0],
    ['proofMin', f.proofMin, 300, 0],
    ['cold', f.cold, false],
  ]);

  // Kaltgare als Teiglinge (Standard 'balls'): kurze Stockgare, lange kalte Stückgare.
  // Die Gesamtdauer (bulk+proof) ist in beiden Varianten identisch.
  testScheduleCase('Direkt · Lange Gare ~24 h · Teiglinge kalt (Standard)', { method: 'direct', yeast: 0.18, coldStage: 'balls' }, f => [
    ['label', f.label, 'Lange Gare'],
    ['bulkMin', f.bulkMin, 120, 0],
    ['proofMin', f.proofMin, 1440, 0],
    ['cold', f.cold, true],
  ]);

  testScheduleCase('Direkt · Lange Gare ~24 h · im Stück kalt (klassisch)', { method: 'direct', yeast: 0.18, coldStage: 'bulk' }, f => [
    ['bulkMin', f.bulkMin, 1260, 0],
    ['proofMin', f.proofMin, 300, 0],
    ['Summe wie Teiglinge-Variante', f.bulkMin + f.proofMin, 120 + 1440, 0],
  ]);

  testScheduleCase('Direkt · Sehr lange ~48 h · Teiglinge kalt', { method: 'direct', yeast: 0.08, coldStage: 'balls' }, f => [
    ['label', f.label, 'Sehr lange'],
    ['bulkMin', f.bulkMin, 120, 0],
    ['proofMin', f.proofMin, 2460, 0],
    ['cold', f.cold, true],
  ]);

  testScheduleCase('Direkt · Sehr lange ~48 h · im Stück kalt', { method: 'direct', yeast: 0.08, coldStage: 'bulk' }, f => [
    ['bulkMin', f.bulkMin, 2250, 0],
    ['proofMin', f.proofMin, 330, 0],
    ['Summe wie Teiglinge-Variante', f.bulkMin + f.proofMin, 120 + 2460, 0],
  ]);

  testScheduleCase('Direkt · Extrem lang 72 h+ · Teiglinge kalt', { method: 'direct', yeast: 0.05, coldStage: 'balls' }, f => [
    ['label', f.label, 'Extrem'],
    ['bulkMin', f.bulkMin, 120, 0],
    ['proofMin', f.proofMin, 4530, 0],
    ['cold', f.cold, true],
  ]);

  testScheduleCase('Direkt · Extrem lang 72 h+ · im Stück kalt', { method: 'direct', yeast: 0.05, coldStage: 'bulk' }, f => [
    ['bulkMin', f.bulkMin, 4320, 0],
    ['proofMin', f.proofMin, 330, 0],
    ['Summe wie Teiglinge-Variante', f.bulkMin + f.proofMin, 120 + 4530, 0],
  ]);

  testScheduleCase('Vorteig · Schnelle Hauptgare (y ≥ 1,2 %)', { method: 'biga', yeast: 1.5 }, f => [
    ['label', f.label, 'Schnelle Hauptgare'],
    ['bulkMin', f.bulkMin, 90, 0],
    ['cold', f.cold, false],
  ]);

  testScheduleCase('Vorteig · Mittlere Hauptgare (0,5 % ≤ y < 1,2 %)', { method: 'biga', yeast: 0.5 }, f => [
    ['label', f.label, 'Mittlere Hauptgare'],
    ['bulkMin', f.bulkMin, 120, 0],
  ]);

  testScheduleCase('Vorteig · Lange Hauptgare (0,18 % ≤ y < 0,5 %)', { method: 'biga', yeast: 0.18 }, f => [
    ['label', f.label, 'Lange Hauptgare'],
    ['bulkMin', f.bulkMin, 150, 0],
  ]);

  testScheduleCase('Vorteig · Sehr lange Hauptgare · Teiglinge kalt', { method: 'biga', yeast: 0.05, coldStage: 'balls' }, f => [
    ['label', f.label, 'Sehr lange Hauptgare'],
    ['bulkMin', f.bulkMin, 150, 0],
    ['proofMin', f.proofMin, 1080, 0],
    ['cold', f.cold, true],
  ]);

  testScheduleCase('Vorteig · Sehr lange Hauptgare · im Stück kalt', { method: 'biga', yeast: 0.05, coldStage: 'bulk' }, f => [
    ['bulkMin', f.bulkMin, 960, 0],
    ['proofMin', f.proofMin, 270, 0],
    ['Summe wie Teiglinge-Variante', f.bulkMin + f.proofMin, 150 + 1080, 0],
  ]);

  // ─────────────────────────────────────────────────────────────
  heading('6 · Mehl-Warnung');

  // Caputo Pizzeria: maxH 48. Extrem lang → totalH = (4320+330)/60 = 77.5 h > 48 → zu lang
  testFlourWarn('Gärzeit zu lang — Caputo Pizzeria + Extrem lang (77 h > max 48 h)', {
    flour: 'caputo_pizzeria', yeast: 0.05, hyd: 63
  }, html => [
    ['"zu lang" in Warnung', html.includes('zu lang')],
    ['kein "zu kurz"',       !html.includes('zu kurz')],
  ]);

  // Caputo Manitoba Oro (W380): minH 48. Mittlere → totalH = (120+300)/60 = 7 h < 48 → zu kurz
  // hyd 72 liegt im Fenster [70,85], damit nur die Gärzeit-Warnung anschlägt.
  testFlourWarn('Gärzeit zu kurz — Manitoba Oro + Mittlere Gare (7 h < min 48 h)', {
    flour: 'caputo_manitoba', yeast: 0.5, hyd: 72
  }, html => [
    ['"zu kurz" in Warnung', html.includes('zu kurz')],
    ['kein "zu lang"',       !html.includes('zu lang')],
  ]);

  // Vorteig-Reife zählt mit: Biga (+24 h) + Lange Hauptgare (8,5 h) = 32,5 h ≥ minH 16 → OK
  testFlourWarn('Keine Warnung — Biga-Reife zählt zur Gärzeit (Cuoco + Biga)', {
    flour: 'caputo_cuoco', method: 'biga', yeast: 0.3, hyd: 65
  }, html => [
    ['kein Warn-HTML', html.trim() === ''],
  ]);

  // Caputo Cuoco: minH 72. Extrem lang → totalH = 77.5 h, passt. hyd 65 = hydMin → kein Warn
  testFlourWarn('Keine Warnung — Caputo Cuoco + Extrem lang + hyd 65 %', {
    flour: 'caputo_cuoco', yeast: 0.05, hyd: 65
  }, html => [
    ['kein Warn-HTML', html.trim() === ''],
  ]);

  // Caputo Pizzeria: hydMax 65. hyd 70 → zu hoch
  testFlourWarn('Hydration zu hoch — Caputo Pizzeria + 70 %', {
    flour: 'caputo_pizzeria', hyd: 70, yeast: 0.3
  }, html => [
    ['"zu hoch" in Warnung', html.includes('zu hoch')],
  ]);

  // Dallagiovanna Sofia: hydMin 60. hyd 55 → zu niedrig
  testFlourWarn('Hydration zu niedrig — Dallagiovanna Sofia + 55 %', {
    flour: 'dallag_sofia', hyd: 55, yeast: 1.5
  }, html => [
    ['"niedrig" in Warnung', html.includes('niedrig')],
  ]);

  // Caputo Nuvola: maxH 48, minH 12, hyd 60–65. Lange Gare (~26 h) + hyd 63 → alles OK
  testFlourWarn('Keine Warnung — Caputo Nuvola + Lange Gare + hyd 63 %', {
    flour: 'caputo_nuvola', hyd: 63, yeast: 0.3
  }, html => [
    ['kein Warn-HTML', html.trim() === ''],
  ]);

  // Preset-Plausibilität: die effektiven Werte jedes Presets dürfen KEINE Mehl-Warnung auslösen.
  // (Spiegelt js/presets.js wider — bei Preset-Änderungen hier mitziehen.)
  const PRESET_STATES = {
    'napoli_klassisch': { method: 'direct', hyd: 60, salt: 2.8, oil: 2, yeast: 0.2, flour: 'caputo_pizzeria' },
    'napoli_65':        { method: 'direct', hyd: 65, salt: 2.8, oil: 2, yeast: 0.3, flour: 'caputo_pizzeria' },
    'napoli_kalt':      { method: 'direct', hyd: 65, salt: 3.0, oil: 2, yeast: 0.1, flour: 'caputo_cuoco' },
    'schnell':          { method: 'direct', hyd: 62, salt: 2.5, oil: 2, yeast: 1.5, flour: 'caputo_pizzeria' },
    'napoli_biga':      { method: 'biga', hyd: 65, salt: 2.8, oil: 2, yeast: 0.3, pref: 100, bhyd: 45, prefMature: 24, flour: 'caputo_cuoco' },
    'napoli_poolish':   { method: 'poolish', hyd: 66, salt: 2.5, oil: 2, yeast: 0.2, pref: 66, prefMature: 14, flour: 'dallag_monica' },
    'teglia':           { method: 'direct', hyd: 75, salt: 2.5, oil: 4, ballw: 320, yeast: 0.3, flour: 'caputo_nuvola_super' }
  };
  Object.keys(PRESET_STATES).forEach(key => {
    testFlourWarn('Preset „' + key + '" löst keine Mehl-Warnung aus', PRESET_STATES[key], html => [
      ['kein Warn-HTML', html.trim() === ''],
    ]);
  });

  // Randfall: Hydration exakt an der oberen Grenze (hydMax) darf NICHT warnen (Code prüft >, nicht ≥).
  // Caputo Nuvola Super: hydMax 85. yeast 0.3 + balls-Kaltgare → Gärzeit 26 h liegt im Fenster [24,168].
  testFlourWarn('Hydration exakt an hydMax (85 % · Nuvola Super) — keine Warnung', {
    flour: 'caputo_nuvola_super', hyd: 85, yeast: 0.3, coldStage: 'balls'
  }, html => [
    ['kein Warn-HTML', html.trim() === ''],
  ]);

  testFlourWarn('Hydration 0,01 über hydMax (85,01 % · Nuvola Super) — Warnung "zu hoch"', {
    flour: 'caputo_nuvola_super', hyd: 85.01, yeast: 0.3, coldStage: 'balls'
  }, html => [
    ['"zu hoch" in Warnung', html.includes('zu hoch')],
  ]);

  // Randfall: Hydration exakt an der unteren Grenze (hydMin) darf NICHT warnen (Code prüft <, nicht ≤).
  // Dallagiovanna Sofia: hydMin 60, minH 0, maxH 24. Schnellgare (yeast 1,5) hat ~4,25 h Gärzeit.
  testFlourWarn('Hydration exakt an hydMin (60 % · Dallag Sofia) — keine Warnung', {
    flour: 'dallag_sofia', hyd: 60, yeast: 1.5
  }, html => [
    ['kein Warn-HTML', html.trim() === ''],
  ]);

  testFlourWarn('Hydration 0,01 unter hydMin (59,99 % · Dallag Sofia) — Warnung "niedrig"', {
    flour: 'dallag_sofia', hyd: 59.99, yeast: 1.5
  }, html => [
    ['"niedrig" in Warnung', html.includes('niedrig')],
  ]);

  // ─────────────────────────────────────────────────────────────
  heading('7 · Backzeit (skaliert mit Teiglingszahl)');

  // Erwartung: Math.max(10, N * (W<=260 ? 5 : 7))
  testCase('Backzeit · 4 × 250 g → 20 min', { balls: 4, ballw: 250 }, R => [
    ['bakeDur', Math.max(10, R.N * (R.W <= 260 ? 5 : 7)), 20, 0],
  ]);
  testCase('Backzeit · 1 × 250 g → min. 10 min', { balls: 1, ballw: 250 }, R => [
    ['bakeDur', Math.max(10, R.N * (R.W <= 260 ? 5 : 7)), 10, 0],
  ]);
  testCase('Backzeit · 8 × 250 g → 40 min', { balls: 8, ballw: 250 }, R => [
    ['bakeDur', Math.max(10, R.N * (R.W <= 260 ? 5 : 7)), 40, 0],
  ]);
  testCase('Backzeit · 4 × 320 g (Teglia) → 28 min', { balls: 4, ballw: 320 }, R => [
    ['bakeDur', Math.max(10, R.N * (R.W <= 260 ? 5 : 7)), 28, 0],
  ]);

  // ─────────────────────────────────────────────────────────────
  heading('8 · Vorteig-Reifezeit (fließt in die Gesamtdauer)');

  // matureMin = prefMature × 60; totalMin enthält diese Reifezeit
  let bigaTotal18 = 0, bigaTotal48 = 0;

  testCase('Biga · Reifezeit 18 h → matureMin 1080', {
    method: 'biga', prefMature: 18, pref: 70, hyd: 65
  }, R => {
    bigaTotal18 = R.totalMin;
    return [
      ['matureMin', R.matureMin, 1080, 0],
      ['totalMin ist Zahl', typeof R.totalMin === 'number', true],
    ];
  });

  testCase('Biga · Reifezeit 48 h → matureMin 2880 · Total 30 h länger', {
    method: 'biga', prefMature: 48, pref: 70, hyd: 65
  }, R => {
    bigaTotal48 = R.totalMin;
    return [
      ['matureMin', R.matureMin, 2880, 0],
      ['Total +1800 min (= 30 h)', bigaTotal48 - bigaTotal18, 1800, 0],
    ];
  });

  testCase('Poolish · Reifezeit 14 h → matureMin 840', {
    method: 'poolish', prefMature: 14, pref: 50, hyd: 66
  }, R => [
    ['matureMin', R.matureMin, 840, 0],
  ]);

  testCase('Direkt · keine Vorteig-Reifezeit (matureMin 0)', { method: 'direct' }, R => [
    ['matureMin', R.matureMin, 0, 0],
  ]);

  // Reifezeit zählt zur Mehl-Warnung: schwaches Mehl + lange Biga-Reife → "zu lang"
  // Dallag Sofia maxH 24. Biga 48 h Reife + Hauptteig-Gare → deutlich > 24 h
  testFlourWarn('Mehl-Warn · lange Biga-Reife überschreitet schwaches Mehl', {
    flour: 'dallag_sofia', method: 'biga', prefMature: 48, yeast: 0.3, hyd: 62
  }, html => [
    ['"zu lang" in Warnung', html.includes('zu lang')],
  ]);

  // ─────────────────────────────────────────────────────────────
  heading('9 · Olivenöl (Bäckerprozent, Masse bleibt erhalten)');

  // Öl ist ein Bäckerprozent wie Salz/Hefe: flour = total/(1+h+s+y+o), oil = flour*o.
  // Wichtig: flour+water+salt+yeast(frisch)+oil MUSS exakt das Gesamtgewicht ergeben.
  testCase('Direkt · 62 % Hyd, 2 % Öl — Mehl sinkt, Masse bleibt N×W', { oil: 2 }, R => {
    const expFlour = 1000 / (1 + 0.62 + 0.028 + 0.003 + 0.02); // = 598.44
    return [
      ['total', R.total, 1000, 0],
      ['flour', R.flour, expFlour, 0.05],
      ['oil = flour × 0,02', R.oil, expFlour * 0.02, 0.02],
      ['Summe = Gesamtgewicht', R.flour + R.water + R.salt + R.yeast + R.oil, 1000, 0.01],
    ];
  });

  testCase('Direkt · 0 % Öl — oil = 0, Formel wie zuvor', { oil: 0 }, R => [
    ['oil', R.oil, 0, 0.001],
    ['flour = total/1,651', R.flour, 1000 / 1.651, 0.05],
  ]);

  testCase('Teglia · 75 % Hyd, 4 % Öl — höhere Ölmenge', { hyd: 75, oil: 4, ballw: 320, balls: 4 }, R => {
    const total = 1280;
    const expFlour = total / (1 + 0.75 + 0.028 + 0.003 + 0.04);
    return [
      ['total', R.total, total, 0],
      ['flour', R.flour, expFlour, 0.1],
      ['oil = flour × 0,04', R.oil, expFlour * 0.04, 0.05],
      ['Summe = Gesamtgewicht', R.flour + R.water + R.salt + R.yeast + R.oil, total, 0.01],
    ];
  });

  // Bei Vorteig kommt das Öl komplett in den Hauptteig, nie in Biga/Poolish.
  testCase('Biga · Öl geht komplett in den Hauptteig (Vorteig ölfrei)', {
    method: 'biga', pref: 70, bhyd: 45, hyd: 65, oil: 2
  }, R => [
    ['oil > 0', R.oil > 0, true],
    ['mOil-Anzeige = Gesamtöl', parseFloat(document.getElementById('mOil').textContent), R.oil, 0.05],
    ['Summe = Gesamtgewicht', R.flour + R.water + R.salt + R.yeast + R.oil, 1000, 0.01],
  ]);

  // ─────────────────────────────────────────────────────────────
  heading('10 · Anleitungs-Hinweise (Autolyse-Dauer & Hefe-Präzision)');

  // Autolyse ohne Salz: Enzym-Warnung muss erscheinen, sobald der Autolyse-Schritt aktiv ist (yeast < 1,2 %)
  testCase('Autolyse-Enzymhinweis erscheint bei Direkt + Hefe < 1,2 %', { method: 'direct', yeast: 0.3 }, () => [
    ['Hinweis "Autolyse nicht über" in Anleitung', document.getElementById('guideSteps').innerHTML.includes('Autolyse nicht über'), true],
  ]);

  // Sehr kleine Hefemenge (< 1 g absolut) → Feinwaage-/Auflöse-Hinweis muss erscheinen
  testCase('Feinwaage-Hinweis bei sehr kleiner Hefemenge (< 1 g)', { method: 'direct', yeast: 0.03 }, R => [
    ['yeast < 1 g (Testvoraussetzung)', R.yeast < 1, true],
    ['0,01-g-Feinwaage-Hinweis in Anleitung', document.getElementById('guideSteps').innerHTML.includes('0,01-g-Feinwaage'), true],
  ]);

  // Normale Hefemenge (Standard-Preset-Bereich) → kein Feinwaage-Hinweis nötig
  testCase('Kein Feinwaage-Hinweis bei normaler Hefemenge', { method: 'direct', yeast: 0.3 }, R => [
    ['yeast ≥ 1 g (Testvoraussetzung)', R.yeast >= 1, true],
    ['kein 0,01-g-Feinwaage-Hinweis', !document.getElementById('guideSteps').innerHTML.includes('0,01-g-Feinwaage'), true],
  ]);

  // Randfall: sehr kleine Hefemenge gilt AUCH bei Trockenhefe (die Umrechnung × 1/3 macht es noch kleiner)
  testCase('Feinwaage-Hinweis gilt auch für Trockenhefe unter 1 g', {
    method: 'direct', yeastType: 'dry', yeast: 0.05
  }, R => [
    ['yeast < 1 g (Testvoraussetzung)', R.yeast < 1, true],
    ['0,01-g-Feinwaage-Hinweis in Anleitung', document.getElementById('guideSteps').innerHTML.includes('0,01-g-Feinwaage'), true],
  ]);

  // ─────────────────────────────────────────────────────────────
  heading('11 · Randfälle / Edge Cases');

  // 1 Teigling — kleinste sinnvolle Stückzahl, Formel muss trotzdem sauber aufgehen
  testCase('1 Teigling à 250 g — Bäckerprozente bleiben korrekt', { balls: 1, ballw: 250 }, R => [
    ['total', R.total, 250, 0],
    ['flour', R.flour, 151.42, 0.05],
    ['water', R.water, 93.88, 0.05],
    ['salt',  R.salt,  4.24,  0.02],
    ['Summe = Gesamtgewicht', R.flour + R.water + R.salt + R.yeast + R.oil, 250, 0.01],
  ]);

  // Sehr viele Teiglinge — Skalierung darf nicht driften
  testCase('20 Teiglinge à 250 g — Skalierung bleibt exakt', { balls: 20, ballw: 250 }, R => [
    ['total', R.total, 5000, 0],
    ['flour', R.flour, 3028.47, 0.1],
    ['water', R.water, 1877.65, 0.1],
    ['Summe = Gesamtgewicht', R.flour + R.water + R.salt + R.yeast + R.oil, 5000, 0.01],
  ]);

  // 0 % Öl — Öl-Zeile/-Wert muss sauber auf 0 bleiben (keine NaN/negative Reste)
  testCase('0 % Öl — oil exakt 0, keine Nebenwirkung auf Mehl/Wasser', { oil: 0 }, R => [
    ['oil', R.oil, 0, 0.001],
    ['flour = total/1,651', R.flour, 1000 / 1.651, 0.05],
  ]);

  // Sehr kleine Hefemenge (< 1 g absolut) — Grenzwert selbst prüfen (nicht nur weit darunter)
  testCase('Hefemenge knapp unter 1 g löst Feinwaage-Hinweis aus', { method: 'direct', yeast: 0.16 }, R => [
    ['yeast < 1 g', R.yeast < 1, true],
    ['0,01-g-Feinwaage-Hinweis', document.getElementById('guideSteps').innerHTML.includes('0,01-g-Feinwaage'), true],
  ]);

  testCase('Hefemenge knapp über 1 g löst KEINEN Feinwaage-Hinweis aus', { method: 'direct', yeast: 0.17 }, R => [
    ['yeast ≥ 1 g', R.yeast >= 1, true],
    ['kein 0,01-g-Feinwaage-Hinweis', !document.getElementById('guideSteps').innerHTML.includes('0,01-g-Feinwaage'), true],
  ]);

  // ─────────────────────────────────────────────────────────────
  heading('12 · Kombinationen (Vorteig × Kaltgare-Stufe × Öl gleichzeitig)');

  // Biga + Öl + coldStage 'bulk' (klassisch) gleichzeitig — bisher wurden diese Features
  // nur isoliert getestet (Öl nur mit Standard-coldStage, coldStage nur ohne Öl/Vorteig).
  testCase('Biga · Öl 3 % · Kaltgare im Stück (bulk) — alles gleichzeitig korrekt', {
    method: 'biga', pref: 70, bhyd: 45, hyd: 65, oil: 3, coldStage: 'bulk', yeast: 0.3
  }, R => [
    ['oil > 0 im Hauptteig', R.oil > 0, true],
    ['mOil-Anzeige = Gesamtöl', parseFloat(document.getElementById('mOil').textContent), R.oil, 0.05],
    ['pYeast = gesamte Hefe (auch mit Öl/bulk)', R.pYeast, R.yeast, 0.001],
    ['mYeast = 0', R.mYeast, 0, 0.001],
    ['Summe = Gesamtgewicht', R.flour + R.water + R.salt + R.yeast + R.oil, 1000, 0.01],
  ]);

  testScheduleCase('Biga · Kaltgare im Stück (bulk) — Gesamtdauer identisch zu balls-Variante', {
    method: 'biga', pref: 70, bhyd: 45, hyd: 65, oil: 3, coldStage: 'bulk', yeast: 0.05
  }, f => [
    ['cold', f.cold, true],
    ['Summe bulk+proof = 150+1080 (wie balls-Variante)', f.bulkMin + f.proofMin, 150 + 1080, 0],
  ]);

  // Poolish + Öl + coldStage 'bulk' gleichzeitig
  testCase('Poolish · Öl 2 % · Kaltgare im Stück (bulk) — alles gleichzeitig korrekt', {
    method: 'poolish', pref: 50, hyd: 66, oil: 2, coldStage: 'bulk', yeast: 0.2, salt: 2.5
  }, R => {
    return [
      ['pf = flour × 0,5',   R.pf, R.flour * 0.5, 0.05],
      ['pw = pf (1:1)',      R.pw, R.pf, 0.05],
      ['pf + mFlour = flour', R.pf + R.mFlour, R.flour, 0.01],
      ['pw + mWater = water', R.pw + R.mWater, R.water, 0.01],
      ['mOil-Anzeige = Gesamtöl', parseFloat(document.getElementById('mOil').textContent), R.oil, 0.05],
      ['Summe = Gesamtgewicht', R.flour + R.water + R.salt + R.yeast + R.oil, 1000, 0.01],
    ];
  });

  // Poolish mit hoher Hydration nahe der Klemmgrenze + Öl + Trockenhefe gleichzeitig
  testCase('Poolish · hyd nahe hydMax (66 %) · Öl · Trockenhefe — Kombination bleibt stabil', {
    method: 'poolish', pref: 66, hyd: 66, oil: 2, yeastType: 'dry', yeast: 0.2, flour: 'dallag_monica'
  }, R => [
    ['nicht (fälschlich) begrenzt (66 % Anteil bei 66 % Hyd)', R.prefClamped, false],
    ['mWater ≥ 0', Math.max(0, R.mWater), R.mWater, 0.001],
    ['pYeast = Trockenhefe komplett im Vorteig', R.pYeast, R.yeast, 0.001],
  ]);

  // ─────────────────────────────────────────────────────────────
  heading('13 · Masseerhaltung (alle Methoden, alle Presets)');

  // Grundidentität flour+water+salt+yeast(frisch)+oil = total muss für JEDE Methode gelten —
  // die Vorteig-Aufteilung verschiebt nur, wo Mehl/Wasser/Hefe liegen, nie die Summen.
  ['direct', 'biga', 'poolish'].forEach(method => {
    testCase('Masseerhaltung · Methode „' + method + '" bei 4 % Öl', {
      method, pref: 60, bhyd: 50, hyd: 65, oil: 4, yeast: 0.3
    }, R => [
      ['flour+water+salt+yeast+oil = total', R.flour + R.water + R.salt + R.yeast + R.oil, R.total, 0.01],
    ]);
  });

  Object.keys(PRESET_STATES).forEach(key => {
    testCase('Masseerhaltung · Preset „' + key + '"', PRESET_STATES[key], R => {
      const checks = [
        ['total = N × W', R.total, R.N * R.W, 0],
        ['flour+water+salt+yeast+oil = total', R.flour + R.water + R.salt + R.yeast + R.oil, R.total, 0.01],
      ];
      if (PRESET_STATES[key].method !== 'direct') {
        checks.push(['pf + mFlour = flour', R.pf + R.mFlour, R.flour, 0.01]);
        checks.push(['pw + mWater = water', R.pw + R.mWater, R.water, 0.01]);
      }
      return checks;
    });
  });

  // ─────────────────────────────────────────────────────────────
  heading('14 · Zeitplan-Rückwärtsrechnung ("Fertig sein um…")');

  // fmtClock-Nachbau (aus js/guide.js) — nur zum Prüfen des gerenderten Anleitungstexts,
  // dupliziert keine Rechenlogik.
  function fmtClockTest(d) {
    const wd = ['So', 'Mo', 'Di', 'Mi', 'Do', 'Fr', 'Sa'][d.getDay()];
    const p = n => String(n).padStart(2, '0');
    return `${wd} ${p(d.getDate())}.${p(d.getMonth() + 1)}. · ${p(d.getHours())}:${p(d.getMinutes())}`;
  }

  const FIXED_ISO = '2026-08-01T18:00';
  let sharedTotalMin = null;

  testCase('Start-Modus ("Ich starte um…") — Start-Chip = eingegebene Zeit', {
    method: 'direct', yeast: 0.3, coldStage: 'balls', timeMode: 'start', timeISO: FIXED_ISO
  }, R => {
    sharedTotalMin = R.totalMin;
    const start = new Date(FIXED_ISO);
    const end = new Date(start.getTime() + R.totalMin * 60000);
    const html = document.getElementById('guideSteps').innerHTML;
    return [
      ['Start-Zeit im Banner', html.includes(fmtClockTest(start)), true],
      ['Fertig-Zeit im Banner', html.includes(fmtClockTest(end)), true],
    ];
  });

  testCase('Ziel-Modus ("Fertig sein um…") — Start wird korrekt zurückgerechnet', {
    method: 'direct', yeast: 0.3, coldStage: 'balls', timeMode: 'target', timeISO: FIXED_ISO
  }, R => {
    const target = new Date(FIXED_ISO);
    const computedStart = new Date(target.getTime() - R.totalMin * 60000);
    const html = document.getElementById('guideSteps').innerHTML;
    return [
      ['totalMin identisch zum Start-Modus (gleiche Zutaten)', R.totalMin, sharedTotalMin, 0],
      ['errechneter Start-Zeitpunkt im Banner', html.includes(fmtClockTest(computedStart)), true],
      ['Zielzeit (Fertig) unverändert im Banner', html.includes(fmtClockTest(target)), true],
    ];
  });

  // Ziel-Modus bei Vorteig (Biga) — Reifezeit muss in der Rückwärtsrechnung mitzählen
  testCase('Ziel-Modus bei Biga — Reifezeit fließt in die Rückwärtsrechnung ein', {
    method: 'biga', pref: 70, bhyd: 45, hyd: 65, prefMature: 24, timeMode: 'target', timeISO: FIXED_ISO
  }, R => {
    const target = new Date(FIXED_ISO);
    const computedStart = new Date(target.getTime() - R.totalMin * 60000);
    const html = document.getElementById('guideSteps').innerHTML;
    return [
      ['totalMin enthält die Vorteig-Reife (matureMin ⊂ totalMin)', R.totalMin >= R.matureMin, true],
      ['errechneter Start-Zeitpunkt im Banner', html.includes(fmtClockTest(computedStart)), true],
    ];
  });

  // ─────────────────────────────────────────────────────────────
  const s = document.getElementById('summary');
  s.textContent = failed === 0
    ? '✓ Alle ' + passed + ' Prüfungen bestanden'
    : '✗ ' + failed + ' von ' + (passed + failed) + ' Prüfungen fehlgeschlagen';
  s.className = failed === 0 ? 'ok' : 'fail';
  console.log('[Tests] ' + passed + ' passed, ' + failed + ' failed');
})();
</script>
</body>
</html>
