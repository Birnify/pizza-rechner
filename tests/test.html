<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Pizzateig-Rechner — Tests</title>
<style>
  body{font-family:-apple-system,"Segoe UI",Roboto,sans-serif;background:#faf6f0;color:#2b2420;margin:0;padding:24px;line-height:1.5;}
  h1{font-size:20px;}
  #summary{font-size:16px;font-weight:700;padding:10px 14px;border-radius:10px;margin:14px 0;display:inline-block;}
  #summary.ok{background:#e7f3e9;color:#2f6b38;}
  #summary.fail{background:#fdeceb;color:#a8341f;}
  .case{background:#fff;border:1px solid #ece3d8;border-radius:10px;padding:12px 14px;margin-bottom:10px;}
  .case h3{margin:0 0 6px;font-size:14px;}
  .assert{font-family:ui-monospace,Consolas,monospace;font-size:12.5px;padding:2px 0;}
  .assert.pass::before{content:"✓ ";color:#2f6b38;}
  .assert.fail{color:#a8341f;font-weight:700;}
  .assert.fail::before{content:"✗ ";}
  /* Versteckte DOM-Stubs: calc()/buildGuide() schreiben in diese Elemente. */
  #stubs{position:absolute;left:-9999px;top:-9999px;}
</style>
</head>
<body>
<h1>🍕 Pizzateig-Rechner — Rechenlogik-Tests</h1>
<p>Per Doppelklick öffnen. Testet die echten Module (<code>js/calc.js</code>, <code>schedule.js</code>,
<code>guide.js</code>) gegen erwartete Werte — ohne Server, ohne Installation.</p>
<div id="summary">läuft…</div>
<div id="results"></div>

<!-- Nur die Ausgabe-Elemente, in die calc()/buildGuide() schreiben (Eingabe-UI wird hier nicht geladen) -->
<div id="stubs">
  <span id="totalW"></span><span id="ballsOut"></span><span id="ballwOut"></span>
  <span id="gFlour"></span><span id="gWater"></span><span id="gSalt"></span><span id="gYeast"></span><span id="yLabel"></span>
  <span id="pFlour"></span><span id="pWater"></span><span id="pYeast"></span><span id="pyLabel"></span>
  <span id="mFlour"></span><span id="mWater"></span><span id="mSalt"></span><span id="mYeast"></span>
  <div id="mYeastRow"></div>
  <span id="waterTemp"></span><span id="iceAmt"></span><div id="iceNote"></div>
  <div id="guideSummary"></div><div id="guideSteps"></div>
</div>

<!-- Produktions-Module (ohne ui/presets/storage/main: die brauchen die volle Eingabe-UI) -->
<script src="../js/dom.js"></script>
<script src="../js/state.js"></script>
<script src="../js/schedule.js"></script>
<script src="../js/guide.js"></script>
<script src="../js/calc.js"></script>

<script>
"use strict";
(function () {
  const results = document.getElementById('results');
  let passed = 0, failed = 0;

  const BASE = {
    balls: 4, ballw: 250, hyd: 62, salt: 2.8,
    method: 'direct', pref: 70, bhyd: 45,
    yeastType: 'fresh', yeast: 0.30,
    ddt: 24, room: 21, knead: '3',
    timeMode: 'start', timeISO: ''
  };

  function round(x) { return typeof x === 'number' ? Math.round(x * 1000) / 1000 : x; }

  // overrides -> kompletter Zustand, einmal rechnen, dann Checks aus R bauen.
  // buildChecks(R) liefert [label, actual, expected, tol?]; tol weggelassen = strikte Gleichheit.
  function testCase(name, overrides, buildChecks) {
    Object.assign(PZ.state, BASE, overrides);
    PZ.calc();
    const checks = buildChecks(PZ.R);

    const box = document.createElement('div');
    box.className = 'case';
    const h = document.createElement('h3');
    h.textContent = name;
    box.appendChild(h);

    checks.forEach(([label, actual, expected, tol]) => {
      const ok = (tol == null) ? actual === expected : Math.abs(actual - expected) <= tol;
      const line = document.createElement('div');
      line.className = 'assert ' + (ok ? 'pass' : 'fail');
      line.textContent = ok
        ? `${label} = ${round(actual)}`
        : `${label}: erwartet ${expected}${tol != null ? ' ±' + tol : ''}, war ${round(actual)}`;
      box.appendChild(line);
      ok ? passed++ : failed++;
    });
    results.appendChild(box);
  }

  // 1) Direkt, Standardwerte: Bäckerprozente (Mehl = Total / (1+Hyd+Salz+Hefe))
  testCase('Direkt · Standard (4×250, 62% Hyd, 2,8% Salz, 0,30% Hefe frisch)', {}, R => [
    ['total', R.total, 1000, 0],
    ['flour', R.flour, 605.69, 0.05],
    ['water', R.water, 375.53, 0.05],
    ['salt',  R.salt, 16.96, 0.05],
    ['yeast', R.yeast, 1.817, 0.01],
    ['wT (Schüttwasser)', R.wT, 27, 0],
    ['ice', R.ice, 0, 0]
  ]);

  // 2) Eiswasser nötig (warm + Maschine): DDT-Wassertemp + Eismenge (Energiebilanz)
  testCase('Eiswasser · room 28°, ddt 22°, Maschine', { room: 28, ddt: 22, knead: '6' }, R => [
    ['wT', R.wT, 4, 0],
    ['ice', R.ice, 84, 0]
  ]);

  // 3) Biga-Vorteig-Aufteilung (100% Mehl im Vorteig, 45% Biga-Hydration, 90% der Hefe in den Vorteig)
  testCase('Biga · pref 100%, bhyd 45%, hyd 65%', { method: 'biga', pref: 100, bhyd: 45, hyd: 65 }, R => [
    ['pf (Vorteig-Mehl)',    R.pf, 594.88, 0.05],
    ['pw (Vorteig-Wasser)',  R.pw, 267.70, 0.05],
    ['pYeast (90% der Hefe)',R.pYeast, 1.606, 0.01],
    ['mFlour (Rest = 0)',    R.mFlour, 0, 0.001],
    ['mWater (Restwasser)',  R.mWater, 118.98, 0.05]
  ]);

  // 4) Trockenhefe = 1/3 der Frischhefemenge
  testCase('Trockenhefe-Umrechnung (0,30% → 1/3)', { yeastType: 'dry', yeast: 0.30 }, R => [
    ['yeast', R.yeast, 0.6057, 0.005],
    ['yWord', R.yWord, '(trocken)']
  ]);

  // Zusammenfassung
  const s = document.getElementById('summary');
  s.textContent = failed === 0
    ? `✓ Alle ${passed} Prüfungen bestanden`
    : `✗ ${failed} von ${passed + failed} Prüfungen fehlgeschlagen`;
  s.className = failed === 0 ? 'ok' : 'fail';
  console.log(`[Tests] ${passed} passed, ${failed} failed`);
})();
</script>
</body>
</html>
